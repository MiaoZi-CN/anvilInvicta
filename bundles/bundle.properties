block.ai-ancientmessage.name = ancient message board
block.ai-ancientmessage.description = decorative version of the world message board, self-illuminating.
block.ai-new-message.name = fluorescent message board
block.ai-new-message.description = higher durability than normal message boards, self-illuminating.

# arsenal
block.ai-integer-module-production.name = resonance assembly plant
block.ai-integer-module-production.description = enemy attacks are developing towards densities and intensities we never anticipated. under worse logistical conditions, we must ensure dominance in strategic technologies, accelerating the deployment of more advanced, superior units, turrets, and production buildings. for current walls, integrally cast walls are stronger but cannot be built quickly for initial defense lines; modular walls are fast to construct but slightly inferior against physical impacts — even so, modular walls remain one of the mainstream directions for passive defense development. similarly for turrets and units, they need stronger firing systems and tougher armor to withstand higher chamber pressures and combat intensity. to this end, guke corporation has developed integer variable technology, based on particle vibration patterns and highly integrated vibration rates. by controlling the unified vibration rate of particle nuclei to fix them into specific shapes, this forms an atomic nucleus structure within the range of two-nucleon forces — a structure nearly unbreakable. the integer variable core, which stabilizes the overall structure, controls the surface fit between all particles, absorbs the energy from the regular vibration of module particles, and generates a magnetic field that then regularizes the particle vibration.\n\nalthough each ia integer particle module core requires energy supply, the conversion efficiency between these two energies approaches 100%, and no dedicated power connection is needed, so ia integer variable modules are generally not considered power-consuming devices.
block.ai-integer-module-production.details = 

# units
unit.ai-debtor.name = debtor
unit.ai-debtor.description = [accent]light hover tank[]\nfrontline expendable vehicle focused on low cost and high mobility. relatively cheap to build. uses a hover chassis, ignoring rough terrain. main weapon is a photon shot cannon that fires high-energy overloaded photonic bullets, causing violent energy collapse upon hitting enemy vehicles, devastating internal components. after each shot, the main weapon must forcibly cool down, during which it cannot fire. suitable for swarm attacks or harassment, but not for direct confrontation with heavy armor.
unit.ai-debtor.details = geometrize! geometrize!
unit.ai-overdue.name = overdue
unit.ai-overdue.description = [accent]heavy hover tank[]\ndesigned as a heavily armored breakthrough and point-defense anti-air unit. the hover system allows stable movement over rough terrain, but mobility is poor with slow turning. equipped with a photon cannon for destroying enemy targets and a single stored-energy anti-air missile for emergency use. only one missile; after firing, it loses anti-air capability. without air superiority, it is an easy target for enemy air forces. suitable for advancing with main forces or defending key nodes.\n[sky]ideal for mass deployment.
unit.ai-overdue.details = surge‘s little brother
unit.ai-probe.name = probe
unit.ai-probe.description = [accent]autonomous reconnaissance drone[]\nlow-cost expendable drone designed for battlefield intelligence gathering. with high-speed engines and lightweight airframe, it can quickly cross enemy lines, scan key areas, and upload data to the central database in real time. unarmed, no return design, self-destructs after mission completion. single-use, no recovery needed.
unit.ai-probe.details = geometrize! geometrize!
unit.ai-entropy.name = entropy
unit.ai-entropy.description = [accent]autonomous support gunship[]\ncheap expendable ground support platform. lightweight, highly maneuverable, equipped with a thermal beam emitter that continuously melts light and medium ground armor. almost no armor, structural strength only enough to withstand small arms fire. very low cost, suitable for mass deployment.
unit.ai-entropy.details = entropy syndrome
unit.ai-vector.name = vector
unit.ai-vector.description = [accent]elite autonomous assault gunship[]\nlow-altitude fire platform designed for frontline assault. equipped with a thermal bomb system that releases a high-temperature melt stream on impact, causing sustained ablation damage to buildings. the airframe is covered with kinetic repulsion film that absorbs and converts impacts, resisting direct fire from anti-air cannons. armor is still weak, with limited survivability against medium and large caliber fire. medium mobility, can be used for advancing or eliminating forward defensive positions.
unit.ai-vector.details = thermal bomb system! beam gun!
unit.ai-sage.name = sage
unit.ai-sage.description = [accent]autonomous beam gunship[]\ndeveloped during the period of comprehensive competition with the "mirror realm", all non-essential defense and functional weight was stripped to specialize in offense.\nbefore the establishment of common design standards, this light fighter was designed with the craziest philosophy and team to achieve mass-producible, low-cost, high-offense capability. 70% of its weight is dedicated to a heavy gamma cannon, capable of dealing damage far exceeding its size in a short time. in exchange, to keep costs low, apart from a small point-defense weapon, the airframe has no external defensive measures.
unit.ai-sage.details = 
unit.ai-inquiry.name = inquiry
unit.ai-inquiry.description = [accent]autonomous anomalous fighter[]\nthe "inquiry" follows the "lightweight" concept, with increased firepower and slightly improved armor to provide better protection for internal crew and equipment — but only against small fragments. to ensure survivability in head-on combat, ancient technology corporation equipped it with a close-range energy shield generator, providing shields on three angles to protect against kinetic and some chemical energy rounds. although the shield capacity is not large, few fighters of its class can survive before breaking its shield. in terms of firepower, the "inquiry" carries a missile pod and a super-high-energy gamma cannon, capable of tearing apart enemies at close range. it also features an advanced fire control computer, taking another step on the path of firepower supremacy.
unit.ai-inquiry.details = unexpectedly, the "inquiry"‘s mobility did not meet expectations. with only frontal protection, it seems only superior in one-on-one engagements. in cluster battles, its loss ratio becomes unbelievably low. combined with its relatively high cost, the "inquiry" logically fell out of market demand. to salvage the situation, ancient technology corporation issued a statement that "the inquiry should be used in conjunction with heavy armor units", relegating it to second-line combat support in group battles, unable to serve as a main assault unit.
unit.ai-memorial.name = memorial
unit.ai-memorial.description = [accent]elite autonomous fire gunship[]\nequipped with a fusion gun and missile pod, bringing doom to enemy bases.
unit.ai-memorial.details = 
unit.ai-scout.name = scout
unit.ai-scout.description = 
unit.ai-scout.details = supernova era
unit.ai-dusk.name = dusk
unit.ai-dusk.description = [accent]mining ship[]\nfor rapid resource collection and mineral extraction, ancient technology corporation launched the "dusk" mining vessel. based on the mono design, the "dusk" is equipped with a laser collector that quickly mines hardness level 3 and below. with good mobility, it can rapidly gather materials and build defenses for newly established front-line cores. simple structure, but not cheap — in fact, compared to similar mining vessels on the market, it is expensive, a classic example of sacrificing cost-effectiveness for unit efficiency. however, the "dusk" has proven surprisingly effective in practice, allowing front-line high-pressure operations to ignore basic material logistics. with some logic controllers, it can also replace transport between distant or adjacent factories. the "dusk" will be a key asset for early logistical support.
unit.ai-dusk.details = note! the "dusk" has no self-defense capability — no weapons and no armor. ensure the front line is stable before mass deployment. also, do not let the "dusk" operate near nuclear facilities, batteries, etc., without explosion-proof equipment — the high cost means losing them will be a huge economic burden and cripple logistics.
unit.ai-arouse.name = ravina
unit.ai-arouse.description = [accent]autonomous drone[]\nto quickly establish a foothold on new planets and continuously expand frontlines, ancient technology corporation designed the "sequence" system with a "quantity-first" philosophy. this core unit is the standard drone for the prism core.
unit.ai-arouse.details = the "ravina" core unit is a long-range drone. to save costs, unlike typical armed core units, it is not equipped with weapons or shield systems. instead, to rapidly build a foothold at the landing point, it carries two construction beams and an inertial engine, allowing high movement speed and high build speed to establish the base and protect the tough landing party.
chip.name = aacst
chip.description = [accent]sed-1 "super starflare" (aacst)[]\nin recent battles, we have spotted our own "starflare" fighters emerging from enemy formations. after shooting down a few, our engineers analyzed the wreckage. here is the onboard information summary:\n[white]sed-1 "super starflare" (aacst) heavy fighter. by topologically reverse-constructing the wreckage of the downed enemy "starflare" unit, we obtained an efficient and rapid method to produce its airframe and modified it. its large, spacious airframe offers ample room for modification, leading us to design this air-superiority optimized variant (aacst). the sed-1 "super starflare" has hovering and vtol capability. it carries three small-caliber rapid-fire cannons. we replaced the original single cannon with higher rate-of-fire guns and added two more, greatly enhancing its anti-air and anti-light-ground-armor capabilities. additionally, we added a drum-fed internal air-to-air missile pod, allowing it to threaten enemy air armor. we welded a thin layer of armor on both the inside and outside of the airframe, preventing small fragments from causing damage. we do not understand [red][irrelevant content deleted]
chip.details = want to know what irrelevant content was deleted? they started insulting our designers. original text:\nwe cannot understand why they waste such large airframe space without adding any equipment or armor, and why the excellent engine has such an exaggeratedly high tractive force — it‘s clear that aside from technology so advanced we can barely comprehend it, they have no creative thinking whatsoever.\nlooks good? maybe we really should revise our design philosophy.

# gases
liquid.ai-steam.name = steam
liquid.ai-steam.description = pressurized steam, an indispensable medium in large-scale compound power generation systems.
liquid.ai-neon.name = neon
liquid.ai-neon.description = [accent]highly inert element[]\nextremely stable substance; conventional physical equipment cannot break through its electron shell to react chemically with other substances. neon is widely used for material isolation layers. at room temperature, neon exists as a gas with a low boiling point, making it suitable as a cryogenic coolant for superconductivity research and other fields. neon can reduce the beam waist radius of directed energy weapons, increasing power density, and has important applications in research, military, and industry.
liquid.ai-neon.details = neon‘s directional mobility, quantum stability, and phase difference stability make it an indispensable research material in cutting-edge physics.
liquid.ai-super-chemfuel.name = entropy fluid
liquid.ai-super-chemfuel.description = multiphase super-compound fuel. used as fuel for rockets and other machinery, unlocking the full potential of equipment that uses traditional fuels.
liquid.ai-super-chemfuel.details = after analyzing and reconstructing genetically engineered plants such as starpetal, chromanalgae, spore, and barnacle, combined with our own genetic technology, we developed this super fuel. perhaps it should be called promethium?

# fluids
liquid.ai-liquid-chemfuel.name = liquid compound fuel

# items
platinum.name = platinum
platinum.description = a silver-white metal with high chemical stability. thanks to its high melting point and high conductivity, it can be made into many heat-resistant electronic devices. it is widely used in the current nuclear industry, large-capacity power storage equipment, high-strength cannons and their projectiles. platinum and its alloys are also used in armor, walls, and other structures requiring high mechanical strength. in addition, due to its high reflectivity, it is used for optical coating.
osmium.name = osmium
osmium.description = one of the rarest elements in nature, and the densest known metal. osmium in its elemental form is chemically stable at low temperatures and has some corrosion resistance. powder or sponge forms oxidize in air to form highly toxic osmium tetroxide. currently, osmium is used in alloys and protective coatings for precision electronics due to its high density, hardness, and corrosion resistance. we have tried making high-density projectiles and walls from pure osmium, but the results were inferior to osmium alloys.
item.ai-e.name = engineering points
item.ai-e.description = packaged engineering data packets, used to provide basic construction parameters to constructors.\ndata model sets trained by the central host from large amounts of environmental data, returning specific cnc information based on actual terrain to assist constructors, or can be connected to the main database to provide computational support for engineering research.
item.ai-as.name = research points
item.ai-as.description = packaged research data packets, used to maintain the underlying operational logic of equipment.\ndata model sets distributed by the central laboratory, generating underlying operating systems for various facilities as needed, or can be connected to the main database to provide computational support for technology research.
item.ai-boron.name = boron
item.ai-boron.description = high-purity boron, mainly used to produce borosilicate glass.
item.ai-borosilicate-glass.name = borosilicate glass
item.ai-borosilicate-glass.description = special optical glass, high light transmittance, high chemical stability, low thermal expansion coefficient, widely used in various chemical and research facilities.
item.ai-wired-glass.name = carbon glass
item.ai-wired-glass.description = [accent]new special high-strength glass[]\nspecial materials are embedded in a conventional glass matrix to enhance hardness, mechanical strength, and toughness. unlike previous processes that added metal wires or mesh, we assembled carbon nanotube networks as the filler material for this wired glass.
item.ai-wired-glass.details = perfect understanding of carbon manipulation.
item.ai-integer-module.name = resonance alloy
item.ai-integer-module.description = we are currently mired in ground combat. the initial strategy of "rapid breakthrough, swift occupation, high-speed construction" has been completely shattered. these bird-like aliens have far more resilient logistics than we imagined, so we must ensure dominance in strategic technologies, accelerating the deployment of more advanced units, turrets, and production buildings. to this end, colonial scientists developed integer module technology based on particle vibration models and highly integrated vibration rate parameters, applying it to materials science, resulting in the first-generation particle integer module, the "im particle shaping module". inside the module is an integer resonance unit that stabilizes the overall structure — it absorbs energy from the regular vibration of particles within the module to build a feedback field, which in turn constrains and synchronizes the vibration phase and frequency of the particles. the conversion efficiency between these two energies approaches 100% under theoretical non-dissipative conditions, so the module can be used independently as a structural material.
item.ai-integer-module.details = truly [accent]indestructible[] — if only we could produce strong interaction materials.
item.ai-osmium.name = osmium
item.ai-osmium.description = one of the rarest elements in nature, and the densest known metal. osmium in its elemental form is chemically stable at low temperatures and has some corrosion resistance. powder or sponge forms oxidize in air to form highly toxic osmium tetroxide. currently, osmium is used in alloys and protective coatings for precision electronics due to its high density, hardness, and corrosion resistance. we have tried making high-density projectiles and walls from pure osmium, but the results were inferior to osmium alloys.
item.ai-zenium.name = zenium
item.ai-zenium.description = we first discovered this element on anyaru. scientists in our home galaxy predicted its existence centuries ago, but due to its extreme instability, all believed it could not naturally occur. yet zenium is found as massive native deposits in anyaru‘s crust, especially in shallow layers. although mining it is not easy, scientists have brought zenium to the world. zenium metal has a common silver-white luster, good ductility, strong radioactivity, and extremely high hardness. scientists predict it will be widely used in the nuclear industry and related fields. upon radioactive decay, zenium produces osmium and radon gas, which could be used to produce osmium in areas lacking osmium deposits.
item.ai-zenium.details = the extremely high conductivity of zenium in a vacuum has been confirmed. additionally, it has been reported that electrified zenium exhibits greatly increased stability — its prospects in the electronics industry are vast.
item.ai-xunetium.name = xunetium
item.ai-xunetium.description = a substance that maintains stable physical structure without being composed of atoms. it is made of "dimers" that cannot be decomposed by conventional means. xunetium is one material form of dimers, with varying appearance (mainly in color and transparency), but the main body resembles hard, crystalline materials like glass or quartz. xunetium does not change state at high or low temperatures, does not follow the three-state transformation of other substances, and does not expand or contract with heat. xunetium usually appears in large aggregates, so mining must be careful to maintain deposit stability.
item.ai-xunetium.details = 
item.ai-alpha-crystal.name = alpha
item.ai-alpha-crystal.description = [accent]explosive microparticle crystal cluster[]\nalpha crystals contain enormous energy, valuable for both warheads and energy. the abundance of various forms of alpha in g147-3‘s crust is astonishingly high. this indicates an extremely rich planet, yet the planet‘s natives are still divided into multiple states, with an incredibly low utilization rate of the planet‘s resources. our best short-term plan is to occupy this planet — at any cost.
item.ai-alpha-crystal.details = 
item.ai-hard-light.name = topological manifold
item.ai-hard-light.description = one of the achievements of the "dark" project, programmable ultra-hard light. most physical properties can be adjusted on demand, but requires dark energy injection to maintain its metastable topological structure.
item.ai-hard-light.details = indestructible; soft as cotton! light as a feather; heavier than a mountain!
item.ai-dark-energy.name = dark energy
item.ai-dark-energy.description = one of the achievements of the "dark" project, a mysterious energy strongly associated with dark matter, capable of manipulating gravity like painting.
item.ai-dark-energy.details = gravity brush.
item.ai-dark-matter.name = dark matter
item.ai-dark-matter.description = one of the achievements of the "dark" project, a fundamental component that does not participate in electromagnetic interactions yet dominates the mass distribution of the universe, weaving an invisible gravitational skeleton for spacetime.
item.ai-dark-matter.details = the scaffolding of the cosmos.
item.ai-vibrant-alloy.name = pulse alloy
item.ai-vibrant-alloy.description = [accent]new energy field responsive material[]\nstores large amounts of energy; in a metastable state, it releases that energy under certain conditions. high hardness, excellent ductility and dielectric properties. bulk pulse alloy is suitable for field components in new passive defense equipment. powdered pulse alloy has a unique force-induced directional energy release characteristic, widely used in kinetic repulsion components.
item.ai-vibrant-alloy.details = pulse alloy is not a single alloy, but a collective term for alloys capable of storing energy. the output from a pulse alloy factory is only unactivated "blank". after some simple processes, it can be made into different pulse metal parts — completely deactivated pulse alloy instead appears as a yellow-black membranous substance, amazing, right?
item.ai-glass-steel.name = glass steel
item.ai-glass-steel.description = [accent]new lightweight multiphase structural material[]\n"glass steel" has extreme tensile strength and fracture toughness, tough and with very low brittleness, capable of absorbing massive kinetic energy through deformation. suitable for structures bearing heavy loads, or as armor interlayers and linings. additionally, it has excellent extreme environment performance, maintaining good mechanical properties under ultra-high/low temperatures and strong acid/alkaline conditions, making it ideal for protective casings of special equipment and critical components under extreme conditions.
item.ai-glass-steel.details = a very advanced structural material. due to its unique molecular bonding structure, glass steel has extremely high strength.
item.ai-chip.name = processor
item.ai-chip.description = [accent]advanced processor[]\nusing single-crystal diamond substrate and carbon nanotube circuits, greatly improved per-watt computing power and thermal management efficiency. carbon materials quickly dissipate heat from local hotspots. the wide bandgap and chemical inertness of diamond allow the chip to operate stably in extreme environments such as high temperature, strong radiation, and corrosive gases. [sky]processors can also be modified into photon ammunition constructors, but that will destroy the processor.
item.ai-chip.details = advanced computing element.
item.ai-viaon-chip.name = hyperprocessor
item.ai-viaon-chip.description = [accent]superphase processor[]\na new generation of computing devices built on new materials — [accent]xunetium[] and phase fabric — completely different from standard electronic component design templates, yielding efficiency hundreds of times higher than conventional computing modes. it reduces chip area while greatly increasing overall strength, making it an ideal choice for rapid frontline construction. is this our ultimate processor path?
item.ai-viaon-chip.details = alien computing element.
item.ai-crystal-processor.name = crystalline processor
item.ai-crystal-processor.description = [accent]photonic crystal processor[]\ncan process any problem at superhuman speed. the core technology lies in using topological insulators made of new crystalline materials. the interior of this material is a typical insulator, while the surface has conductor-like properties. this unique structure means information transmission no longer relies on traditional charge movement but on electron spin, greatly improving information transfer efficiency.\nissues like signal delay, waveform distortion, and interference faced by traditional processors are solved by on-chip optical interconnects. the revolutionary design of the crystal processor uses no resistance, capacitance, or inductance, achieving optical device communication. light in waveguides is almost dispersion-free and interference-resistant, making it an almost perfect carrier for information transmission, greatly suppressing common interference and loss of electrical signals.
item.ai-crystal-processor.details = cutting-edge computing element.

# walls
block.ai-metal-block.name = dark metal block
block.ai-metal-block.description = unique subatomic bonding brings extreme mechanical properties — any conventional weapon (including he, ap, dew) that cannot directly break subatomic bonds cannot harm it. only special dissociation fields can decompose it.
block.ai-metal-block.details = they couldn‘t have done it!
block.ai-glass-steel-wall.name = reconstructed alkane crystal wall
block.ai-glass-steel-wall.description = the material science achievement of "glass steel" has brought huge progress in defense. unlike conventional walls, the glass steel wall is not a single large glass steel block, but a multi-angle lined and composite armored block. it also includes substrate shock-absorbing components based on glass steel‘s properties, specifically designed to counter electrical weapons and residual shocks. the coated poly-diamond superhard layer can intercept and reflect or scatter dew attacks and partially reflect kinetic fire. these will provide us with an [accent]unimaginable[] level of protection.
block.ai-glass-steel-wall.details = 
block.ai-rejection.name = rejection block
block.ai-rejection.description = one-time anti-vehicle defensive obstacle. can be mass-produced on the front line to slow enemy armored advances, buying time for friendly fire.\n\nopens automatically when friendly units approach. durability cannot be restored.
block.ai-rejection.details = control deployment density to maximize resource utilization.
block.ai-pulse-wall.name = pulse wall
block.ai-pulse-wall.description = [accent]super kinetic barrier block[]\ndeploys a kinetic barrier to protect friendly structures and block enemy fire, providing an unprecedented level of protection. can withstand continuous fire from super-heavy hybrid electromagnetic weapons, with better protection against kinetic weapons, but very poor protection against electrical weapons.
block.ai-pulse-wall.details = uses high-frequency pulses to control phase fabric to oscillate at a specific frequency, producing a physical film of guaranteed dimensions and maximum equivalent strength.
block.ai-pulse-wall-large.name = large pulse wall
block.ai-pulse-wall-large.description = [accent]super kinetic barrier block[]\ndeploys a kinetic barrier to protect friendly structures and block enemy fire, providing an unprecedented level of protection. can withstand continuous fire from super-heavy hybrid electromagnetic weapons, with better protection against kinetic weapons, but very poor protection against electrical weapons.
block.ai-pulse-wall-large.details = uses high-frequency pulses to control phase fabric to oscillate at a specific frequency, producing a physical film of guaranteed dimensions and maximum equivalent strength.
block.ai-composite-wall.name = plastic composite wall
block.ai-composite-wall.description = [accent]damping armor-like structure[]\nadding plastanium to a titanium-based structural wall enhances plasticity, allowing the wall to absorb kinetic energy through plastic collapse, reducing kinetic projectile penetration and keeping the main internal structure intact. additionally, this wall exhibits near-complete stopping power against low-power warheads — projectiles are deflected or trapped in the surface collapse zone, leaving the wall‘s main body almost unaffected.\nthis property was not anticipated in the original design.
block.ai-composite-wall.details = this design does have a drawback — the stopping distance for kinetic projectiles is larger than for other hard alloy walls, meaning small walls have almost no resistance, and only large walls are effective under high pressure.
block.ai-carbon-fiber-reinforced-wall.name = carbon composite armor wall
block.ai-carbon-fiber-reinforced-wall.description = mainstream [accent]passive defense structure[] used by both civilizations on anyaru.\nthrough carbon manipulation technology, carbon fiber reinforced armor is slightly deformed and assembled to block their ap rounds. of course, since it was designed for fighting between them, our shells are almost unstoppable for them. even shells designed for explosions, with unprecedented yields, can easily remove their highly brittle, impact-sensitive base.
block.ai-carbon-fiber-reinforced-wall.details = we know very well that the natives of anyaru cannot possess such carbon manipulation technology — molecular-level techniques are very advanced even for anyaru civilization. it seems the natives are trying to resist us. it‘s not necessary to [red]exterminate[] them all — our population on anyaru is still pitifully small. just show them who‘s boss.
block.ai-heavy-titanium-wall.name = heavy titanium wall
block.ai-heavy-titanium-wall.description = a relatively advanced wall of the anyaru people.\nthe [accent]titanium-thorium alternating layer[] might indeed be an innovation for them, but it was not designed to resist us — small-caliber cannons can cause massive damage to this wall. although the first shot may not penetrate, it can destroy the lining structure, and the next shot will tear apart everything behind the wall. additionally, when the thorium layer is penetrated and exposed to high temperature and pressure, the radioactive powder it releases is irreversibly damaging to their biological structures.
block.ai-heavy-titanium-wall.details = ignoring a basic fact: thorium causes radiation embrittlement of the titanium layers, eventually becoming as brittle as rust.
block.ai-heavy-titanium-wall-large.name = large heavy titanium wall
block.ai-heavy-titanium-wall-large.description = larger and heavier heavy titanium wall, following the "bigger is better" combat philosophy.
block.ai-surge-phase-wall-large.details = although stronger, these materials are difficult to build quickly with constructors — stacking materials only slightly improves the already low strength, greatly reducing coverage area. a losing proposition… [red]too expensive!
block.ai-surge-phase-wall.name = surge phase wall
block.ai-surge-phase-wall.description = anyaru people‘s [accent]surge alloy synthetic defense structure[]\ndeflects incoming low-kinetic projectiles — essentially a knockoff of the "pulse wall".
block.ai-surge-phase-wall.details = they don‘t have the technology to master phase energy — even though they opened the door to phase theory for us, a knockoff is a knockoff. phase fabric cannot stably release energy under direct interference from surge alloy, so how can it produce a shield membrane?
block.ai-surge-phase-wall-large.name = large surge phase wall
block.ai-surge-phase-wall-large.description = larger and heavier surge phase wall, following the "bigger is better" combat philosophy.
block.ai-surge-phase-wall-large.details = although stronger, these materials are difficult to build quickly with constructors — stacking materials only slightly improves the already low strength, greatly reducing coverage area. a losing proposition… [red]too expensive!
block.ai-adamantane-wall.name = carbon synthetic wall
block.ai-adamantane-wall.description = [accent]carbon programmable armor[]\nthe carbon hybrid wall was not initially in our passive defense plans. but after observing practical applications on anyaru, we found this carbon manipulation technology offers greater convenience and efficiency for building early defense lines. compared to the loosely structured carbon walls of the natives and anyaru civilization, we embedded more carbon composites and used various high-carbon polymers and high-density alkanes as internal fillers. high-hardness armor acts as gap and lining structures. this significantly improves impact and penetration resistance, compensating for carbon‘s brittle nature and low structural strength. the surface is coated with a diamond-like reinforced layer that deflects bullets. additionally, the wall connects easily with other carbon armor structures, allowing theoretically [accent]infinite[] expansion of armor and structural strength, while greatly reducing repair losses.
block.ai-adamantane-wall.details = anyaru, unyielding!

# factories
block.ai-photoetching-machine.name = photoetching assembly line
block.ai-photoetching-machine.description = [accent]integrated photoetching line[]\nfully sealed structure, integrated processor production line. input materials to continuously produce advanced processors.
block.ai-photoetching-machine.details = pick and place, east and west.
block.ai-t2-photoetching-machine.name = impression molding machine
block.ai-t2-photoetching-machine.description = [accent]photopressure engraving line[]\ndoes not use simple photoimaging equipment or photochemical semiconductor etching that relies on airtightness and environmental stability. instead, uses intensified coherent light pressure to engrave on scattered dimer-based aerogels, allowing circuit engraving on xunetium crystals at the scale of 20 dimers (individual dimers are generally less than 5% the diameter of an electron). the photopressure precision mold prevents structural collapse of the xunetium crystal during etching from damaging the "engraving" equipment, and achieves high production speed to meet frontline and construction needs.
block.ai-t2-photoetching-machine.details = assemblers, assemble!
block.ai-experimental-machine.name = research apparatus
block.ai-experimental-machine.description = small unmanned research apparatus made from simple materials. it might help us transmit nearby data to the host and package it into data packets for output.
block.ai-experimental-machine.details = don‘t underestimate those cheap sensors — they‘ve been a huge help, at least in the early stages of establishing a foothold on this planet.
block.ai-advanced-smelter.name = argon arc metallurgical plant
block.ai-advanced-smelter.description = [accent]multifunctional arc furnace[]\na flexible logic device capable of performing different smelting tasks in a single workshop based on input materials. improved alloy smelting formulas also yield higher efficiency.\nwe have to admit, among all the sub-light speed planets we have conquered and plundered, this is one of the toughest. such high frontline consumption forces us to try new production and combat methods — this machine might be the beginning of multi-threaded equipment design on our plundering journey.
block.ai-advanced-smelter.details = "this is our first time designing a large multifunctional workshop on an alien planet. before this — and before our design — we only saw such equipment on the first planet we plundered, apparently used to make large machines, and only in a few regions. our designers were inspired and started researching similar designs. when the first prototype machine appeared on our home planet, everyone cheered. we cannot understand the people on that plundered planet — they seemed very unwilling to admit that their region was less advanced than others. what a joke." — theater commander catalpa
block.ai-advanced-compressor.name = polymer synthesizer
block.ai-advanced-compressor.description = [accent]high-performance parallel line[]\npolymer materials will become even more important strategic resources. this basic polymer material line can temporarily relieve frontline and logistics construction needs. it can also perform multiple tasks in parallel, quickly producing glass steel to greatly reduce production pressure — perhaps it can replace most old equipment — [accent]efficiency first![]\n
block.ai-advanced-compressor.details = unfortunately, building this factory requires carbon, titanium, and plastanium as raw materials to ensure maximum compressor pump airtightness. even though it can produce glass steel faster, basic plastanium compressors are still necessary — greatly extending the time to establish a front line. hopefully engineers can design other compression solutions.
block.ai-advanced-kiln.name = wired kiln
block.ai-advanced-kiln.description = [accent]high-quality optical line[]\nassembles carbon nanotube networks into a mesh, then evenly distributes and press-molds them in molten glass matrix. compared to laminated glass processes, this wired glass exhibits [accent]unparalleled[] mechanical performance among conventional glass materials. additionally, using carbon fiber mesh as filler is an innovation by colonial scientists, giving the glass better toughness and shatter resistance, further expanding its applications.
block.ai-advanced-kiln.details = next-generation carbon material.

# drills (and water extractor)
block.ai-mini-water-extractor.name = mini water extractor
block.ai-mini-water-extractor.description = continuously extracts water at a very slow rate.
block.ai-mini-water-extractor.details = "my name is mini water extractor, and i have a dream: to provide fluid for the cosmic membrane excitation reorganizer and short-range law release energy device..."
block.ai-fast-drill.name = fast excavator
block.ai-fast-drill.description = [accent]kinetic resonance drill[]\noptimized automated mining operation system. the wear surface of the new drill is completely reconfigured, with multi-position laser cutters and mineral resonance modules inserted between kinetic drill gaps, allowing geometrically faster ore breaking and mining. new supporting [accent]graphene heat exchangers[] enable rapid cooling circulation using fluids. high specific heat capacity coolants or liquid metals are recommended for maximum mining power.
block.ai-fast-drill.details = inputting chemical liquids will not cause explosion.
block.ai-phase-drill.name = phase mining field
block.ai-phase-drill.description = [accent]phase-shift mining equipment[]\nadvanced phase mining system projects an area for mining operations.\na great achievement in the first practical application of phase resonance theory. this new mining system overturns the logic that mining must physically cover minerals, directly shifting minerals from underground to the surface within the effective range. not only does it improve mining efficiency, but it also liberates many covered deposits that could not be used before.
block.ai-phase-drill.details = cutting-edge in-situ collection system.
block.ai-titanium-drill.name = titanium drill
block.ai-titanium-drill.description = can mine titanium, faster than pneumatic drills.
block.ai-titanium-drill.details = relax, titanium shortage is normal.

# power
block.ai-boiler.name = durable boiler
block.ai-boiler.description = uses ambient heat to convert water into ultra-high-pressure steam.
block.ai-boiler.details = 
block.ai-turbine-set.name = magnetic turbine generator
block.ai-turbine-set.description = 
block.ai-turbine-set.details = cannot black start; requires basic energy input to start the generation cycle.
block.ai-tetrad-cracking-engine.name = tetrad cracking engine
block.ai-tetrad-cracking-engine.description = [accent]catalytic synthesis furnace[]\nadvanced synthetic inorganic power generation equipment. uses a copper-based catalytic coating and a three-dimensional carbon structure as the core to react carbon monoxide and hydrogen. the resulting high-calorific-value syngas, along with remaining carbon structures and air, undergoes turbulent co-combustion in the combustion chamber, achieving maximum conversion of solid fuel chemical energy to heat.
block.ai-chemo-ring-engine.name = chemo-ring engine
block.ai-chemo-ring-engine.description = [accent]ring thermal refinery[]\nthe efficiency of solid fossil fuel generators per unit volume has reached its limit. to this end, guke corporation designed a prototype "chemo-ring engine" using petroleum. the chemo-ring engine can perform crude oil distillation, heavy oil cracking, and delayed coking [accent]independently of the petroleum industry chain[] to achieve the optimal combustion ratio of petroleum fuel in aerosol form, generating electricity from petroleum in a more compact and efficient way. [red]\ndestruction upon startup may cause a large explosion.
block.ai-chemo-ring-engine.details = can burn coal, gasoline, diesel, methane, ethylene… a heat engine that can burn many mixed fuels?
block.ai-steam-pressurizer.name = thermal pressurizer
block.ai-steam-pressurizer.description = pressurizes steam from the nozzle.
block.ai-steam-pressurizer.details = 
block.ai-photovoltaic-module.name = photovoltaic module
block.ai-photovoltaic-module.description = [accent]silicon photovoltaic matrix[]\nnext-generation photovoltaic equipment. after simplifying the protective structure and improving the core photoelectric conversion layer, material redundancy is greatly reduced. multiple photovoltaic modules can be interconnected, achieving [accent]cooperative operation[] through shared circuits and expansion interfaces, thus improving overall power generation efficiency. compared to traditional "solar panels" and "large solar panels", it has higher efficiency and lower unit cost. the efficient, compact design also significantly increases effective power generation area per footprint.
block.ai-photovoltaic-module.details = silicon plow era.
block.ai-phase-mass-energy-decay-room.name = phase mass-energy decay chamber
block.ai-phase-mass-energy-decay-room.description = as a premier cutting-edge technology, it is used to directly convert the phase of matter into [accent]energy[] in an extremely short time. since the phase of matter is closely related to its energy and momentum, and among known materials, phase fabric, due to its extremely high energy density, is used as the decay raw material, producing large amounts of electricity in a very short time.\nkeep the phase mass-energy decay chamber away from any area with an energy density gradient, including mining zones, geothermal spots, or even shallow water — these topographic factors will greatly reduce the energy collection rate of phase mass-energy decay.\n\n[red]do not attempt to reduce cooling supply. once the pure energy collection tank ruptures, everything nearby will be reduced to ashes!
block.ai-phase-mass-energy-decay-room.details = if you want stability, use a fusion reactor instead.
block.ai-high-energy-capacitor.name = high-energy capacitor
block.ai-high-energy-capacitor.description = [accent]metastable capacitor[]\nthe new generation of energy storage converts input electricity into metastable particle clusters within the storage medium. the density of particle clusters must be strictly controlled. it can be connected to nearby high-energy capacitors to increase total storage. when specifically excited, surge alloy stably releases electricity for grid peak shaving. unstable during charging, protect it carefully.
block.ai-high-energy-capacitor.details = storing huge amounts of energy is the foundation of modern civilization.
block.ai-t2-power-node.name = advanced power node
block.ai-t2-power-node.description = with the widespread use of electricity here, original transmission equipment can no longer meet production needs. this is a new type of power node that uses series-connected lead-acid batteries to provide voltage, achieving longer transmission distances. we have also updated the power connection equipment — the use of basic processors provides higher transport capacity limits, giving the power node more connections.
block.ai-t2-power-node.details = the series-connected batteries do provide some capacitance to the circuit, but be careful — destroyed battery packs may corrode nearby buildings!

# cores & auxiliary
block.ai-prism-core.name = prism core
block.ai-prism-core.description = [accent]highly automated core[]\nto more quickly establish a foothold on new planets and continuously expand frontlines, ancient technology corporation developed the "prism" core system with a "quantity-first" philosophy, based on the first-generation core blueprint.\ncompared to the first-generation core, the "prism" series of highly automated cores has lower armor and structural strength, but in exchange has larger storage space and more identification bandwidth — this is one of the optimal designs for mass production, widespread deployment, rapid seizure of key points, and minimizing costs while increasing the "survival rate" of deployed cores — at least according to the designers at ancient technology corporation.
block.ai-prism-core.details = glass products are fragile, please handle with care.
block.ai-compartment.name = cargo container
block.ai-compartment.description = 4x4 footprint, stores a huge amount of items.
block.ai-compartment.details = logistics integration.
chip.name = aesir radar
chip.description = a highly advanced composite radar facility. uses ultra-high-frequency detection wave absorption components and physical antennas covering the full spectrum to receive information across all bands. additionally, a heavy interferometric quantum radar is used to detect stealth and orbital targets, and can assist turrets in locking onto enemy units. locked enemies will attempt to evade using maneuvers.
chip.details = sharp eyes.

# logistics
block.ai-t2-reinforced-conduit.name = flux conduit
block.ai-t2-duct-bridge.name = flux duct bridge
block.ai-t2-overflow-duct.name = flux overflow duct
block.ai-t2-underflow-duct.name = flux underflow duct
block.ai-duct-junction.name = duct junction
block.ai-duct-junction.description = bridge between two ducts.
block.ai-duct-junction.details = 
block.ai-super-router.name = sorting hub
block.ai-super-router.description = new sorting component\na logistics sorting module based on routers and sorters. the built-in sorter has been iteratively upgraded and a new control system added. the target item and direction can be directly controlled externally, further simplifying logistics patterns and enabling compact, directed sorting.
block.ai-super-router.details = 
block.ai-metaglass-conveyor.name = light conveyor
block.ai-metaglass-conveyor.description = [accent][]\faster than advanced conveyor. the lightweight floating platform can be placed over liquids.
block.ai-metaglass-conveyor.details = handle with care.
block.ai-metaglass-junction.name = light junction
block.ai-metaglass-junction.description = faster than a junction, but extremely fragile.
block.ai-metaglass-junction.details = 
block.ai-metaglass-router.name = light router
block.ai-metaglass-router.description = faster than a router, but extremely fragile.
block.ai-metaglass-router.details = avatar of the lord god
block.ai-metaglass-bridge-conveyor.name = light bridge conveyor
block.ai-metaglass-bridge-conveyor.description = faster than a bridge conveyor, but extremely fragile.
block.ai-metaglass-bridge-conveyor.details = rainbow bridge connecting hearts.
block.ai-stackbridge.name = plastanium stack bridge
block.ai-stackbridge.description = conveyors and bridge conveyors on serpulo are indeed cheaper and more reliable than those transport trucks. they operate better in relatively unstable environments, which is one reason we continue to develop them.\nthe plastanium stack bridge was developed by combining serpulo‘s plastanium conveyor and bridge conveyor technology. compared to plastanium conveyors, which have poor terrain adaptability and are only suitable for long-distance single-item transport, the plastanium stack bridge can cross gaps or buildings and connect more easily to other transport equipment.
block.ai-stackbridge.details = equipped with special transport components, no need to unpack and repack during transfer.
block.ai-plastanium-router.name = plastanium router
block.ai-plastanium-router.description = distributes items from a stacked conveyor evenly in three directions.
block.ai-flux-rail.name = flux rail
block.ai-flux-rail.description = [accent]high-speed rail[]\nhigh-speed, low-load rail for point-to-point logistics delivery on branch lines. transports items directly to the destination at very high speed, but cannot turn.
block.ai-flux-rail.details = appliedenergistics2:fluix_crystal
block.ai-holographic-rail.name = holo rail
block.ai-holographic-rail.description = [accent]light rail[]\nholographic rail for point-to-point logistics delivery on branch lines. transports items directly to the destination at high speed, extremely low strength.
block.ai-holographic-rail.details = cyberon technology.
block.ai-glass-steel-rail.name = high-speed light rail
block.ai-glass-steel-rail.description = [accent]stack express rail[]\nto meet the huge logistics burden of frontline ammunition transport, we developed this logistics device using glass steel‘s high strength and low density. it can pack a large number of items into a single package and transport them to the destination at once — to maximize transport efficiency, a carriage only departs when fully loaded. when the carriage arrives, items are automatically unloaded.
block.ai-glass-steel-rail.details = handle with care.
block.ai-turbulent-conduit.name = turbulent conduit
block.ai-turbulent-conduit.description = [accent]turbulent conduit[]\nnew type of conduit using a topological carbon-reinforced structure with high elastic recovery against impact loads, not prone to permanent deformation. transports liquids faster than pulse conduits, no leakage, can be placed over any liquid.\n[sky]click to allow/prevent side liquid input.
block.ai-turbulent-conduit.details = fully sealed housing, high-temperature resistant material, can operate normally in extreme environments.

# turrets
block.ai-.name = fragmentation mine
block.ai-.description = simple explosive device, low cost. uses the shockwave from high-velocity explosive detonation to shatter the mine‘s outer shell, sending hundreds of small pre-formed fragments to damage enemies. effective against enemy light armor.
block.ai-.name = anti-vehicle mine
block.ai-.description = simple explosive device, relatively low cost. uses the shockwave from high-velocity explosive detonation to destroy nearby units. causes significant damage to enemy heavy armor within a relatively small radius, but is less effective against targets at longer ranges.
block.ai-.name = tracking mine disperser
block.ai-.description = deploys a set of short-range grenade launchers in the deployment area. based on electrical signals from wave motion detectors, the internal microcomputer accurately detects the presence of enemy units, locks on, and adjusts the launcher angle to target up to four enemies within its firing arc. the propellant ignites, firing four high-explosive warheads that actively track and damage enemy units.
block.ai-.details = although its higher cost might seem to deviate from the original purpose of "mine" tactical weapons, we have to admit: against enemies without active interception systems, it is indeed a very effective tool.
block.ai-unclear-mine.name = nuclear mine
block.ai-unclear-mine.description = explosive device with enormous yield and radius. internally stores a certain amount of high-concentration nuclear fuel. its wave motion detector judges enemy approach. if the microcomputer determines a large number of enemies are approaching, it actively detonates the detonator, compressing the nuclear charge to criticality, creating a spectacular explosion — definitely the most beautiful fireworks the enemy has ever seen.
block.ai-unclear-mine.details = although the yield has been repeatedly reduced to control the nuclear mine‘s lethal radius, it is still a genuine nuclear bomb. ignoring its threat is absolutely wrong.
block.ai-.name = phase oscillation generator
block.ai-.description = large mine using phase mass-energy as the main warhead charge. internal wave motion detectors actively monitor enemy movements. when an enemy enters the blast radius, the internal phase collapse package is activated, inducing phase oscillation. the massive wave energy instantly kills nearby enemies. although expensive, its lethal radius is controllable, making it suitable for deployment in strategic defensive zones closer to the front line to assist in close-range attrition.
block.ai-restricted.name = restricted
block.ai-restricted.description = restricted, small disintegration beam device\nuses an external field to seize control of the engine control system, forcing it to shut down.
block.ai-restricted.details = "central command, you don‘t want your engine to short-circuit and stall, do you?"
block.ai-arklight.name = arklight
block.ai-arklight.description = [accent]attosecond laser[]\nuses a beam to directly penetrate incoming small enemy air units or large barrages. organic operators prefer to call it "the needle". it has excellent penetration against light armor, much better than traditional kinetic anti-air cannons against small fighters.
block.ai-arklight.details = caristo giuseppe‘s golden needle.
block.ai-cersei.name = cersei
block.ai-cersei.description = [accent]electromagnetic pulse system[]\nthe special gun barrel has electrodes connected to a plasma burner, installed at the breech end. when high voltage is applied across the plasma burner electrodes, an arc forms, vaporizing the plasma-generating material into superheated, high-pressure plasma. after absorbing strong electromagnetic radiation emitted by a high-voltage electron beam pump, the plasma exits the barrel. near the target, the ionizing radiation will penetrate any armor, severely damaging enemy electrical equipment. if it hits, the high-temperature plasma also causes some physical damage.
block.ai-cersei.details = electromagnetic cutter.
block.ai-electriclight.name = electric light
block.ai-electriclight.description = [accent]plasma jet[]\nbuilt-in compressor and ionization chamber, draws in air and converts it into high-temperature plasma, then jets it forward. causes severe ablation to hit units or buildings, but due to temperature control and limiter materials, the plasma dissipates after a short flight, resulting in very short range.
block.ai-electriclight.details = hundred thousand thunders.
block.ai-hell.name = hell
block.ai-hell.description = [accent]rocket launcher-like[]\nhell borrows from howitzers, equipped with multiple ammunition types for various combat situations. despite its simple structure, it still exerts powerful suppression on the battlefield, delivering massive firepower in a short time, excellent against unit clusters — however, its fire endurance is low, requiring long reload times between barrages, as its original design goal was to create a long-range damage barrier.\n\nin emergencies, thorium warheads can be used against armored units.
block.ai-hell.details = using concrete demolition warheads on a rocket launcher is indeed a novel design. thanks to its long range, we have a device that can quickly destroy defensive structures and break enemy lines. performance against adaptive armor blocks is not ideal.
block.ai-skynet.name = skynet
block.ai-skynet.description = [accent]automatic anti-air gun battery[]\nequipped with three high-precision, long-range twin rapid-fire cannons, featuring a fire control computer and capable of firing various anti-air ammunition. all ammunition types are equipped with proximity fuses, composite trackers, correction computers, and a barrage network, allowing precise locking onto enemy air units and sharing data across the barrage network. excellent damage against enemy light armor. a coordinated volley from multiple "skynet" units can pose a significant threat to heavy armor. although relatively simple, the "skynet" anti-air system remains our most effective anti-air defense — perhaps it will serve for a long time. its low cost and high damage ensure enemy reconnaissance or assault air units often do not return.
block.ai-skynet.details = also, the skynet defense system can make the night as bright as day.
block.ai-return.name = return
block.ai-return.description = [accent]stacked rocket pod system[]\nelectronically ignited, each shot fires four rockets loaded in a single launch tube, for a total of twelve rockets from three launch tubes per salvo, dealing devastating damage in an instant.\nalthough a rocket launcher, its range and attack mode are very different from conventional rocket launchers — ancient technology corporation designed various warheads and correction fins for the "return" rockets, allowing precise attacks against enemy units and even threats to low-altitude targets. it is a rare weapon system for annihilating enemy vanguard forces.\n\nit seems the only relation to conventional rocket artillery is that it still needs to be angled based on target distance — we don‘t know why the official statement from ancient technology corporation still insists "this is not a missile".
block.ai-return.details = a kind of metal storm, expert at short-term fire coverage missions.
block.ai-obituary.name = obituary
block.ai-obituary.description = [accent]ultra-high-speed electromagnetic gun[]\nat current technology levels, the "obituary" electromagnetic railgun outperforms any contemporary design of its kind. with excellent accuracy, its projectile velocity is two to three times higher than other designs. it uses a high-mass, high-length-to-diameter ratio projectile, providing excellent long-range energy retention and extreme penetration, easily penetrating heavy armor — even then, the remaining projectile still possesses enormous kinetic energy. in multi-target tests, the "obituary" once penetrated multiple layers of large titanium steel walls — indicating that against enemy armor clusters, the "obituary" can easily tear open enemy assault formations.
block.ai-obituary.details = a single arrow through the heart at mach 40.
block.ai-wraith.name = wraith
block.ai-wraith.description = [accent]heavy high-speed fire system[]\nbased on the "ghost" twin heavy cannon, the "wraith" twin electromagnetic-like cannon improves the feed system, cooling device, and magazine capacity. additionally, the "wraith" uses a larger caliber and stronger materials for the gun mount. the oversized magazine allows the "wraith" to continue fighting even if logistics are destroyed — until it is destroyed or ammunition runs out.
block.ai-wraith.details = for autocannons, we used to believe that small caliber, high rate of fire (i.e., "fighter cannons") was the only direction. the "ghost" twin large-caliber cannon gave us a counterexample: this type of weapon, with long range, large caliber, and sturdy construction, has broader applicability and survivability under high pressure — we call them "defensive cannons".\n\nit is said the designer struggled to name his masterpiece, temporarily calling it "wraith". (some recommended "bug killer", but that sounds more like insecticide.)
block.ai-pfc.name = pfc
block.ai-pfc.description = [accent]auto-targeting cannon[]\nautomatically searches for and fires high-velocity shells at nearby enemies. the simple self-guided warhead and hard-core long-rod penetrator can easily tear through light armor and pose a threat to light-medium armored enemies. high-explosive shells also cause significant damage.
block.ai-pfc.details = good friend of the wanderer.
block.ai-directional-force-projector.name = directional force projector
block.ai-directional-force-projector.description = [accent]photon shield projector[]\nprojects a photon shield. the photon shield has very high durability and recovery speed, but requires a long time to recalibrate parameters after destabilization. suitable for use in combination with conventional shield projectors.
block.ai-directional-force-projector.details = 

# misc
block.force-projector.details = "defense magic directly affects your core‘s survival rate... synchronized force absorption consumes a lot of mana..."
block.ai-轻型装配站.name = light assembly station
block.ai-轻型装配站.description = used to assemble small combat units.
block.ai-轻型装配站.details = lightweight integrated assembly workshop, integrating processing, construction, and assembly equipment, can quickly deploy and build small standard units.

# entertainment (units and blocks)
unit.ai-土著坦克.name = suspended weapons carrier
unit.ai-土著坦克.description = this seems to be an important war machine in their military. from the looks of it, it‘s shaped exactly like our tanks, but the gun barrel is longer, and the whole hull is not even as large as one of our track segments. it can only fit three or four native soldiers inside. such a small weapon can only be a weapons carrier.
unit.ai-土著坦克.details = this little thing might not even be able to penetrate a low-tech repulsion field.
unit.ai-土著巨型坦克.name = large fake tank model
unit.ai-土著巨型坦克.description = when we first saw them, we were indeed surprised — this thing is at least twice as large as any of their other combat vehicles!! unfortunately, we never saw it move even a single step. later we learned it‘s just a souvenir.
unit.ai-土著巨型坦克.detail = imagine it moving!
unit.ai-土著运输车.name = wheeled transport vehicle
unit.ai-土著运输车.description = a vehicle consisting of multiple wheel pairs and a front cab. the large rear body seems to be for cargo — of course, remote symmetry analysis shows it can also carry a dozen or so native soldiers inside.
unit.ai-土著运输车.detail = even a dual-cannon turret can easily destroy this thing.
unit.ai-rus-31bm.name = rus-31bm
unit.ai-rus-31bm.description = in recent frontline air battles, an enemy ultra-high-speed interceptor has caught our attention. it can even outrun some of our anti-air missiles at top speed. investigation shows this military model is the rus-31bm/bsm, with extremely high speed. it carries six long-range air-to-air missiles, capable of easily striking our air units, and under certain conditions can shoot down our large missiles — we have to say, this is the most threatening enemy air unit we have encountered so far.
unit.ai-rus-31bm.details = sometimes abandoning armor and embracing mobility and firepower might be correct? shields will solve these problems.
unit.ai-ngf-262m.name = ngf-262m
unit.ai-ngf-262m.description = this is a common enemy fighter, with high linear acceleration and top speed. it carries a high-rate-of-fire multi-purpose cannon, good against soft targets. additionally, 4 air-to-air missiles and 2 air-to-ground missiles allow the ngf-262m to engage multiple targets — such firepower gives it strong air-to-air killing power against our low-tier aircraft. but obviously, this might be the best fighter the enemy has.
unit.ai-ngf-262m.details = well, we have to exaggerate — actually, aside from our reconnaissance aircraft, it can‘t beat any other air unit, and can only barely escape anti-air nets without locking capability.
unit.ai-t-ids.name = t-ids
unit.ai-t-ids.description = in more battles, the enemy air force has deployed dedicated fighter-bombers to try to break our lines for their army. it carries 4 multi-purpose cannons, easily shredding unarmored or lightly armored targets. additionally, 2 air-to-air missiles with very long lock-on range can engage our air units from beyond their fire range. 2 guided bombs and 2 air-to-ground missiles have significant ground attack capability.
unit.ai-t-ids.details = we really can‘t understand why their air force completely abandons armor protection. no matter what expensive equipment they put on their planes, they deserve to be shot down with one hit — especially since the t-ids & ecr‘s maneuverability is even worse than the ngf-262m…
block.ai-military-airport.name = fitness trail
block.ai-military-airport.description = behind enemy front lines, there are always long, wide, winding hard-surfaced flat areas, with a few half-cylinder buildings lying on one side. when we first observed these structures, we were amazed by these strange large runways. it‘s hard to imagine our enemies having such large bodies and a love for exercise, yet they use advanced space compression technology to squeeze themselves into such small vehicles to save materials. after further observation, we realized these fitness trails are just emergency runways for aircraft with slow vertical takeoff and landing. they are not as fond of exercise as we imagined, nor do they have giant physiques.
block.ai-tribal-steam-facility.name = steam generation facility
block.ai-tribal-steam-facility.description = we can clearly see coal trucks entering this building. the barrel-like structure in its center is constantly emitting steam, more precisely, steam mixed with a large amount of coal ash. what do they need this for? truly a powerful force capable of dominating nature‘s life and death…
block.ai-tribal-steam-facility.details = primitive thermal power generation system, generating electricity while severely polluting the atmosphere.
block.ai-radiation-island.name = radiation island
block.ai-radiation-island.description = seems very important to them — barrel-like tubes covering radiation-contaminated islands, and people are still active inside! truly terrifying, the bird cultists aren‘t afraid of radiation…
block.ai-radiation-island.details = primitive nuclear fission power generation system, generating electricity while producing nuclear waste harmful to future generations.
block.ai-city.name = building cluster
block.ai-city.description = these scattered small concrete blocks are actually the dwellings and economic facilities of the local natives? such a huge scale yet such low production efficiency. if replaced by a core of the same footprint, it might be dozens of times more efficient than these "city" building clusters?
block.ai-city.details = compact, highly polluting reinforced concrete cages.
block.ai-rail.name = transport path
block.ai-rail.description = their cargo system uses a rail-guided design, which is opposite to our conveyor belts — of course, the materials needed for their railways are less than one-tenth of what our conveyors require, so it seems a good approach for them.
block.ai-abandoned-petri-dish-depot.name = abandoned petri dish depot
block.ai-abandoned-petri-dish-depot.description = indigenous structures first discovered around the coral reef archipelago, including a large number of culture media and the same type of algae found in the water. due to heavy waves, many of these abandoned culture depots are covered with salt crystals. on some damp walls or floors, those algae grow — it seems the site was abandoned due to sample leakage, and they destroyed this ocean.
block.ai-abandoned-petri-dish-depot.details = terrifying chromanalgae, what use could this artificially designed colorful algae have?
block.ai-manned-firework-launcher.name = manned firework launcher
block.ai-manned-firework-launcher.description = the natives have a habit of enjoying the flames of explosive reactions using flame color tests. this seems periodic and seasonal. every time anyaru completes one orbit around its star, they launch large amounts of these explosives to celebrate the normal operation of the stellar system. according to native behavior, larger explosive flames and higher flight distances seem more valuable to them. on the giant (relative to native body size) combustible column launchers we discovered, observers observed several native individuals entering the combustible columns. although in anyaru‘s atmosphere, more than 90% of these combustibles will explode, many individuals still train in projects to ensure they do not die in the explosion, attempting to enter them.
block.ai-manned-firework-launcher.details = well, those are not fireworks, but devices for launching payloads into planetary orbit — is that failure rate for real?
block.ai-nuclear-rocket-launcher.name = nuclear rocket launcher
block.ai-nuclear-rocket-launcher.description = this launch facility uses nuclear pulse propulsion. below the launcher is a storage area for pulse units containing heavy element fission materials, surrounded by reflective shielding and water cooling systems. during launch, pulse units are detonated sequentially behind the propulsion stage, and the resulting plasma impulse is transferred through a thrust plate, achieving staged acceleration. the payload module can carry biological samples or crew; multiple crewed launches have been recorded. according to available observation data, the system has successfully delivered payloads into planetary orbit three times.
block.ai-nuclear-rocket-launcher.details = the propulsion method is directional nuclear pulse detonation, each pulse unit yield is approximately… a memorial structure stands beside the launcher, inscribed with the words "pioneer" and multiple identifiers, presumed to be mission crew names. current monitoring shows the native group is conducting assembly tests of larger-yield pulse units.
block.abandoned-bio-culture-station.name = abandoned bio-culture station
block.abandoned-bio-culture-station.description = the core area of a large building complex, dominated by a huge machine integrating an ultra-high vacuum pump, low-power ultra-low temperature environment device, etc. it contains many deactivated algae samples, presumably used to study or select algae strains that can survive in ultra-low temperature and vacuum environments.\nthose chromanalgae grow here — it seems the site was abandoned due to sample leakage, and they destroyed this ocean.
block.abandoned-bio-culture-station.details = we overcomplicated it. that was not a screening device — it was just a cryo-electron microscope.

# unused
block.ai-kiwi-wall.name = kiwi armor
block.ai-kiwi-wall.description = new armor block based on reverse engineering of shipboard subatomic technology. exhibits excellent defensive performance against all conventional damage types (kinetic, thermal, electromagnetic, etc.) — pure fusion nuclear weapons can barely scratch the surface. the armor is bottom-programmed to adaptively reconstruct into a continuous whole upon impact, better distributing structural damage from "exotic weapons".
block.ai-kiwi-wall.details = particle paste that sticks any conventional firepower.
block.ai-dark-wall.name = dark armor
block.ai-dark-wall.description = a barrier that physically refuses to be destroyed. like many modern megastructure principles, the main body of dark armor curls up in higher dimensions, exposing only an infinitely small cross-section in our 3d space.
block.ai-dark-wall.details = the manufacturing principle of dark armor involves directed folding of calabi-yau manifolds — simply put, we forcibly stuff a piece of reprogrammed hard light into an extra spatial dimension. when any attack hits it, the energy is instantly redirected to the corresponding area of the higher-dimensional armor plate. since the total surface area of the higher-dimensional armor is enormous, the energy per unit area is permanently below 10⁻⁴⁰ of the material‘s fatigue threshold.

