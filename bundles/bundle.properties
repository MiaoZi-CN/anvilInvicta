status.ai-alpha-burning.name = hyperburn
status.ai-alpha-burning.description = after weaponization, the extremely high temperature of alpha crystals can easily melt metal. additionally, due to their reactive chemical nature, at high temperatures they may react with enemy armor, producing unexpected results.

