# tech
tree.ai-root.name = central database
tree.ai-.name = ground combat system
tree.ai-.description = in this operation of the 35th joint fleet, we were dispatched to the g147-3e star system with the objective of establishing a large-scale fleet supply station. therefore, we were ordered not to use weapons of mass destruction and to preserve the planet‘s geographical integrity. as a result, under the context of long-term space warfare, the development of conventional ground combat weapons and the construction of a combat system must start from scratch.
tree.ai-.name = high-pressure passive defense architecture
tree.ai-.description = upgrades to basic passive defense structures have merely focused on material improvements and stacking. however, inefficient, outdated, and crude designs like turning small walls into large walls or thorium walls into alloy walls can no longer withstand the intensity of current battlefields — we urgently need a fundamental change in the design philosophy of passive defense. it represents a massive improvement in building structural strength, but for non-combat structures (like factories, resource collectors, etc.), this research project has very limited impact, meaning high-pressure passive defense architecture is a research item exclusively for military purposes.
tree.ai-.name = advanced fire control system
tree.ai-.description = the advanced fire control system is a complete revolution over previous basic fire control platforms. its improvements include higher computational power, more adaptable weapon configurations, better fire control algorithms, and new sensors such as optical, wavefunction, and phase-based types. this new fire control system is expected to greatly overcome the shortcomings of high-energy weapons (short range, low accuracy, poor endurance) and conventional autocannons (rate-of-fire limits, poor ammunition compatibility). additionally, it can simultaneously lock onto multiple targets of different sizes and speeds, calculating their possible trajectories and evasion probabilities in real time. this will help us improve the accuracy and lethality of weapon platforms.
tree.ai-.name = fundamental material research
tree.ai-.description = research into the fundamentals of matter is the foundation of technological progress. in the past, this was called "physics", but with new discoveries, some questions have exceeded the scope of physics. they involve chemistry, biology, computer science, materials science, and other disciplines. a single "physics" can no longer satisfy newer research.
tree.ai-.name = advanced materials science
tree.ai-.description = advances in materials science connect all theoretical developments to practical applications. all high-end research results depend on advanced materials. materials are the flesh and blood of civilization, while research is its brain. during the battles at g147-2 and g147-1, the fundamental theories of new materials science have been refined. given the increasingly brutal and high-intensity combat on anyaru, we must expand the development of materials with even better performance.\n\nthis project is a prerequisite for all materials-related technologies.
tree.ai-.name = infrastructure engineering
tree.ai-.description = infrastructure is the common foundation for building on alien worlds, including the foundations of factories, turrets, and even miners. infrastructure engineering covers a wide range of topics and is highly versatile, but specific functions require individual design. better building foundations allow for greater firepower and higher production efficiency. their importance in this phase of combat is self-evident.
tree.ai-.name = logistics & transport
tree.ai-.description = logistics and transport have been essential to civilization since ancient times, including our expedition to alien stars. more efficient and faster logistics will bring rapid development and long-term progress to civilization. no matter how high the production efficiency or firepower, if the logistics system is a mess, we will be the ones to fail.
tree.ai-.name = in-situ collection & storage
tree.ai-.description = collecting basic resources is not difficult, but improving efficiency requires further work on drills, even though they are already mature. the efficiency of basic mineral collection directly affects our development and frontline stability. it is a core technology for occupied regions — even if everyone knows it, we must still invest in research.
tree.ai-.name = logic compilation & control
tree.ai-.description = early artificial intelligence did not have a huge impact on civilization development, but now, lacking manpower and labor, almost all autonomous development depends on logic control. whether it‘s efficient factories or unmanned combat units and turrets, everything requires higher computational efficiency and simpler algorithms. these are both the constraints on our development and our way out.
tree.ai-.name = next-generation aerospace technology
tree.ai-.description = 
tree.ai-.details = 
tree.ai-.name = phase resonance theory
tree.ai-.description = phase fabric, first discovered in the g147-3e star system, has completely opened the door to our understanding of "phase relationships" and "matter". through reverse engineering of the anyaru people‘s phase editing system, we have fully mastered the production technology of phase fabric and can skillfully use known phase resonance effects for production or defense.\nthe "phase resonance theory" posits that any elementary particle has a unique phase relationship relative to other particles, and the same relationship is unique. that is, once the phase relationship is known, we can use a large amount of energy to interfere with one particle, causing its phase relationship to match that of a target particle, achieving "phase resonance", thereby directly replacing it with the target particle. under certain conditions, different particles can also be transformed into other particles, releasing large amounts of energy.
tree.ai-.details = performing phase sequencing is extremely difficult, which fundamentally limits our ability to directly erase enemies using phase resonance effects. however, our research has never stopped.\n\n\nthe anyaru people… their technological level… [red]does not match this…

# maps
coral reef archipelago.name = coral reef archipelago
coral reef archipelago.description = a special algal species created through experiments by local indigenous organisms has taken over all areas below the water surface. they deplete oxygen, kill all life, and then enter a dormant state due to hypoxia. the colorful, rich pigments add the only color to the lifeless archipelago — but no one appreciates these coral-like things. we are here to collect resources, establish the first maritime base, and develop a core more suited to the planet‘s climate. break down these wildly proliferating algae to bring new directions to our biological research.\nseize this unoccupied sea area — don‘t worry, we only have to deal with their navy and their pitifully weak air force.
coastline.name = coastline
coastline.description = after detecting abnormal energy density in the eastern part of this sector, the fireseed b group established a basic defense line here and deployed a core. they will then advance to other frontlines as vanguard forces, and we, group a, will take over here. there are no electronic countermeasures here; we are completely exposed to enemy surveillance. immediately establish the first radar stations to ensure sector-wide detection capability and avoid enemy attacks!\nnote! there are several pure fusion weapons deployed by other fireseed units in this area. they are highly unstable. protect these high-risk "unexploded ordnance". they might greatly assist in expanding our fragmented central database.

