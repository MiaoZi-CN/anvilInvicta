#兵工厂
block.ai-integer-module-production.name = IA核心装配厂
block.ai-integer-module-production.description = 敌人的攻击正在向我们未曾设想过的密度和强度发展。在更差的后勤条件下，我们必须选择保证战略科技的压制性，将更高级、先进的单位、炮塔、生产建筑提上日程。对于现役的墙体来说，整体铸造的墙体更加坚固，但无法达到快速建造以构筑初期防线的目的；模块化墙体建设方便迅速，但对于物理性打击的防御能力稍逊于前者——即使这样，模块化墙体也仍旧是主流被动防御设施的发展方向之一，炮塔、单位等也是同理，它们需要更坚固的发射系统和更强硬的装甲，以适应更高的膛压和战斗烈度。为此，古科公司研发出了以粒子震动规律为蓝本、高度整合震动速率为基础的整型变量技术。通过控制粒子核的统一震动速率来将它们以特定形状固定，这样会形成在两核力作用范围之间的原子核结构——这种结构是几乎无法被打破的。而用于稳定整体结构的整型变量核心则控制所有粒子表面的切合程度，吸收模块粒子规律振动的能量并产生磁场，再利用磁场规律模块粒子的震动。\n\n尽管每个IA整形粒子模块内部核心都需要能量供给，但这两种能量的转化效率能够达到无限接近于100%，无需专线接入因此一般不将IA整型变量模块视为耗能设备。
block.ai-integer-module-production.details = 
#单位
unit.ai-空紫1.name = 闲者
unit.ai-空紫1.description = 与"镜界"全面竞争时期研制，抛弃所有非必要的防御和功能负重以特化进攻能力。\n在通用设计标准产生前，以具备大批量廉价高进攻型武装为目的，由最疯狂的理念和最疯狂的设计团队一手打造的轻型歼击机。全机70%重量用于装载一台重型伽马激光器，可在短时间内对目标造成远超其体型的伤害——相对地，为压低造价，除去一台小型点防御外，机体未配备任何外置防御措施。
unit.ai-空紫1.details = 相比市面上的其他公司的歼击机一一刃琴、狂热我司这款产品的可重复利用性和其高机动性使其在本地星系群市场上更受欢迎
unit.ai-空紫2.name = 问遗
unit.ai-空紫2.description = 由远古科技公司研制的新一代中型歼击机。“问遗”这一机型秉承了“轻量化”的理念，在加强了火力的前提下提升了少量装甲，能够为内部乘员和设备提供更有效的保护——但仅限于小型破片。为了保证“问遗”在正面对敌时的生存性，远古科技公司为其装备了一个近距离能量护盾生成器，能够为其构造三个角度的护盾，以防护动能弹和部分化学能弹——尽管护盾的容量不算大，但实际上没有多少同类型的歼击机能够在击破它的护盾之前活下来。在火力方面，“问遗”配备了一个四连发导弹巢和一门激光束生成器，能够在近距离轻易地撕碎敌人。同时，“问遗”配备了更先进的火控计算机，使“问遗”在火力至上的道路上迈出了更大的一步。
unit.ai-空紫2.details = 难以预料的是，“问遗”的机动性并没有达到预期，仅仅只有正面防护的它似乎只能在一对一进行对抗时占上风，因此在进行集群战斗的时候，“问遗”的战损比会变得不可思议的低，外加相对较高的造价，“问遗”理所应当地脱离了市场的需求。为了挽回局面，远古科技公司发布了“问遗应当配合重装甲单位进攻”的声明，这也迫使“问遗”在集群战斗时成为了二线战斗支援舰，根本无法作为主力进攻单位。(夫妻上阵就没有寡妇的问题)
unit.ai-dusk.name = 日暮
unit.ai-dusk.description = 为了快速采集物资、发掘矿物，远古科技公司推出了“日暮”挖掘舰。以mono为蓝本研发的“日暮”配备了一台激光采集器，能快速发掘硬度为3级及以下的矿物，配合较好的机动，它能够为新建的核心前线快速收集物资、构筑防御工事。它结构简单，但造价不算低，甚至相较于市场上同级别的挖掘舰来说，它的造价是很贵的——这是牺牲了性价比而换取单体效率的典范之一——实际上，“日暮”的实战效果出乎意料的好，它的出现让前线高压作战时不需再考虑基础材料后勤的问题。配合一些逻辑控制器，它也能代替远距离或相邻工厂之间的运输设备，“日暮”将作为前期后勤保障的关键一招。
unit.ai-dusk.details = 注意！“日暮”没有任何自保能力，它没有配备武器且没有任何装甲，因此请确保在大规模使用“日暮”时前线稳固。同时，不要让“日暮”活跃在没有防爆设施的核设施、电池等设备附近——高额的造价会让“日暮”的损失成为你巨大的经济负担，也会造成后勤部的瘫痪
unit.ai-arouse.name = 拉维纳
unit.ai-arouse.description = 为了能够更快速地在新星球立足并持续探索和扩大战线，远古科技公司以“以量为本”的设计理念设计了"序列"系列系统，该核心机则为棱镜核心的自配单位。
unit.ai-arouse.details = “拉维纳”核心机为远程无人机，为节省成本，“拉维纳”没有像平常武装核心机一样配备武器、立场系统，而为了快速进行建设以立足降落点，“拉维纳”额外配备了两台建造仪和惯性引擎发动机，能够以高移速和高建造速度建设基地，保卫强降落先锋队。
chip.name = AACST
chip.description = SED-1 “超级星辉”（AACST）\n\n在近期与敌人的战斗中，我们发现了自家“星辉”战机的身影从敌人的集群中冲出。在击落几架后，我们的工程师对残骸进行了分析。以下是其机载信息整合：\n[wihte]SED-1 “超级星辉”（AACST）重型歼击机，由坠毁的敌方空军单位“星辉”残骸进行拓扑反构建，我们得到了生产其机体有效且高速的方式，并改造制成。其相当大且空旷的机体为我们大大提供了改造空间，由此，我们设计出这款对空特化改进型（AACST）歼击机。SED-1 “超级星辉”具有悬停和垂直起降能力，它搭载了3门小口径速射机炮。我们用更高射速的机炮替换了原版的单一机炮，并额外加装了两门，使得其对空、对地面轻装甲单位杀伤能力大幅增强。此外，我们额外加装了弹鼓式内置空空格斗导弹巢，这令其也能对空中装甲单位构成一定威胁。我们在机体内外侧各焊接了一层薄装甲层，这使得一些小型碎片无法对机身造成损伤。我们不明白[red][无关内容删除]
chip.details = 想知道删除了什么无关内容吗？他们开始侮辱我们的设计师了。原文如下：\n我们想不通它们是怎么想的，把如此大的机体空间浪费掉而不加装任何设备或装甲，优秀的发动机却有如此之高甚至可以称得上是夸张的牵引力浪费——看得出来，它们除了科技先进到我们几乎无法理解之外，没有一点创造的思维。\n好看吗？或许我们真的应该修正设计思路了
#气体
liquid.ai-steam.name = 加压蒸汽
liquid.ai-steam.description = 加压后的蒸汽，大型化合发电系统中不可或缺的中介质。
liquid.ai-neon.name = 氖
liquid.ai-neon.description = 非常稳定的物质，使用常规物理设备无法突破电子层与其他物质发生化学反应。氖气广泛用于物质隔离层。在常温下氖以气体形式存在，具有较低的沸点，可作为低温冷却剂，用于超导研究等领域。对于一些激光器来说，氖可以用于加强激光的聚集度，使得能量更集中，在科研、军事和工业等方面有重要应用。此外，氖的定向运动性、量子稳定性和相编位差稳定性使得氖成为了前沿物理学中不可或缺的研究材料。
liquid.ai-neon.details = 量子色动力学屏障
#流体
liquid.ai-liquid-chemfuel.name = 液态化合燃料
#物品
item.ai-super-chemfuel.name = 化合燃料
item.ai-super-chemfuel.description = 合成加工的一种挥发性超级化合燃料。用作火箭和其他机械的燃料，可以最大程度解放使用传统燃料的设备潜力。 
item.ai-super-chemfuel.details = 在分析并重构星萼、万色藻、孢子、barnacle等基因工程植物后结合我们自己的基因技术研究出了
铂
拥有较高化学稳定性的银白色金属。得益于其高熔点、高导电率，它可以被制成许多耐热电子器件，在当前的核工业、大容量储电设备、高强度火炮及其弹丸中广泛应用，铂及其合金也被用在装甲、墙体等需要高结构强度的建筑中。此外，由于其较高的反射率，它也被用于光学器件表层镀膜。

自然界中非常稀有的元素之一，也是当前发现的密度最大的金属元素。锇单质在低温下的化学性质稳定，有一定的抗腐蚀性。以粉末状或海绵状在空气中暴露会导致其被氧化生成剧毒的四氧化锇。当前锇由于其密度大、硬度高、抗腐蚀性能好的特点，被用于制配合金、保护精密电子器件等。我们曾将其单质制成高密度弹丸和墙体，但效果的确不如锇合金。

item.ai-E.name = 工程点数
item.ai-E.description = 封装完毕的工程数据包，用于向构造机提供基础建造参数。\n大量环境数据经中控主机处理后统一训练的数据模型组，可根据实际地形返回具体数控信息以辅助构造机进行建设，亦可接入主数据库为工程研究提供算力支援。
item.ai-AS.name = 科研点数
item.ai-AS.description = 封装完毕的科研数据包，用于维持设备底层运行逻辑。\n由中央实验室统一分发的数据模型组，可根据实际情况生成适配各类设施的底层操作系统以进行控制，亦可接入主数据库为技术研究提供算力支援。
#硼死了
item.ai-boron.name = 硼
item.ai-boron.description = 纯度极高的硼，主要用于生产硅硼玻璃
item.ai-borosilicate-glass.name = 硅硼玻璃
item.ai-borosilicate-glass.description = 特种光学玻璃，高通光性，高化学稳定性，低热膨胀系数，广泛应用于各类化工与科研设施。
#硅硼玻璃死了
item.ai-wired-glass.name = 碳素玻璃
item.ai-wired-glass.description = 特种玻璃，在钢化玻璃中嵌入了特殊材料以加强其硬度、机械强度和韧性。与以往加入金属丝或网的夹丝玻璃工艺不同，我们将碳素纳米结构拼组为网状，以此充当了这种夹丝玻璃内的填充材料。
item.ai-wired-glass.details =  新型光学材料，对碳操纵的完美理解
item.ai-integer-module.name = 粒子锭
item.ai-integer-module.description = 当下的我们正陷入地面战斗的泥沼中，最初“快速突破、迅速占领、高速建设”的战略部署已经彻底被粉碎。这群鸟种外星人的后勤远比我们想象中的更加牢固，因此我们只能选择保证战略科技的压制性，将更高级、先进的单位、炮塔、生产建筑提上日程。为达到此目的，殖民地科学家研发出了以粒子震动模型为蓝本、高度整合震动速率为基础的整型材料（Integer Module）技术，并在材料学上加以应用，发明出初代粒子整型模块，即“IM粒子整形模块”。模块内部安置一个用于稳定整体结构的整型变量高分子，它通过吸收模块粒子规律振动的能量产生场，以此规律模块粒子的震动。这两种能量的转化效率能够达到无限接近于100%，因此可将其作为独立的单一材料使用。
item.ai-integer-module.details = 真正意义上的坚不可摧，如果我们能制造强相互作用力材料就更好了。

item.ai-osmium.name = 锇
item.ai-osmium.description = 自然界中非常稀有的元素之一，也是当前发现的密度最大的金属元素。锇单质在低温下的化学性质稳定，有一定的抗腐蚀性。以粉末状或海绵状在空气中暴露会导致其被氧化生成剧毒的四氧化锇。当前锇由于其密度大、硬度高、抗腐蚀性能好的特点，被用于制配合金、保护精密电子器件等。我们曾将其单质制成高密度弹丸和墙体，但效果的确不如锇合金。
item.ai-zenium.name = 钲
item.ai-zenium.description = 我们在安亚鲁星上第一次发现了这种元素。在本土星系的科学家早在数百年前就已经预测出了这种元素的存在，但由于钲的性质极不稳定，所有人都认为它完全没有自然生成的可能。但钲却以整块的单质分布在安亚鲁星的地壳中，浅层地壳分布数量尤为突出。尽管开采它并不容易，科学家们仍旧想方设法地将钲带到了世人面前。钲单质具有金属单质常见的银白色光泽，有良好的延展性、极强的放射性和极高的硬度，这些性质被科学家预测钲将被大量运用在核工业及其衍生行业中。钲在放射性衰变后将生成锇单质和氡气，在锇矿床缺乏的区块或许可以借此生产。
item.ai-zenium.details = 钲在真空环境下的极强导电性已经被证实。此外，通电状态下的钲单质被报道其稳定性会大大增加——其电子工业的前景非常宏大。
item.ai-xunetium.name = 铉
item.ai-xunetium.description = 不以原子构成却仍能保持稳定物理结构的物质。它们以无法用传统手段分解的迳子构成，而铉就是迳子的一种物质形式，其外观不一（主要表现在颜色和透光性上），但主体类似玻璃、石英等硬质且表现为晶体的材料。铉在高温、低温下被证实不会改变形态，不符合其他物质的三态转化，且不遵循热胀冷缩效应。铉通常以大块集合出现，因此开采时必须注意矿床的稳定性。
item.ai-xunetium.details = 
item.ai-alpha-crystal.name = Alpha
item.ai-alpha-crystal.description = 易爆微粒的核心矿物。alpha晶体内部蕴含着极大的能量，无论是用在战斗部还是能源上都有非常良好的价值。G147-3地壳中各种形式的Alpha储备丰度高的出奇，我们可以判定这是一颗极度富饶的行星，但行星的土著仍然在他们的行星上面分裂出了多个邦国，他们对这颗行星的资源利用率低的令人发指，我们最好的短期计划就是占领这颗行星————————不计任何代价。
item.ai-alpha-crystal.details = 

item.ai-hard-light.name = 拓补流形
item.ai-hard-light.description = "暗"设计的成果之一，可以根据需求调节绝大部分物理性质，需要暗能量来维持形态不逸散。
item.ai-hard-light.details = 任何意义上的终极材料
item.ai-drak-energy.name = 暗能量

item.ai-vibrant-alloy.name = 脉冲合金
item.ai-vibrant-alloy.description = 新型场材料，贮存大量能量，亚稳定状态在一定的条件下会释放其贮存的能量。硬度高，有极佳的延展性，可作为新型的被动防御设备的溃缩部件。粉末状的脉冲合金由于内部场的存在，会沿着力的作用影响到的介质的传播方向，广泛用于动能排斥构件。
item.ai-vibrant-alloy.details = 脉冲合金不是一种合金，而是能够贮存能量的合金的统称，在脉冲合金工厂中产出的仅为脉冲合金胚，经过一些简单的工序后就能制成不同用途的脉冲金属件。
item.ai-glass-steel.name = 玻璃钢
item.ai-glass-steel.description = "玻璃钢"有极强的的抗拉伸和形变能力，质地硬脆度小，可以通过形变大大吸收动能。适用于需承受极大重量的结构或装甲夹层与内衬层。此外，它具有优良的极端环境工作效能，在超高温低温以及强酸碱环境下也能保持良好的机械性能，是设备镀膜和特种部件的不二之选。\n\n 那些哈比土著称呼玻璃钢为“钛钻石”，他们没办法理解我们是如何批量生产质量稳定的高分复合材料的。
item.ai-glass-steel.details = 新型轻型材料，在武器装甲和基建领域都有极广泛的应用

item.ai-chip.name = 硅碳基处理器
item.ai-chip.description = 使用单晶金刚石作为衬底的新一代处理器。这种芯片相较于以往的传统处理器拥有单位计算量和散热上的优势，金刚石基底也令芯片整体在各种极端环境下仍然能运作。
item.ai-chip.details = 先进计算元件
item.ai-viaon-chip.name = 铉基迳子处理器
item.ai-viaon-chip.description = 在新型材料————铉的基础上构建的全新架构，新一代运算设备完全区别于标准电子元件设计模板，使得效率超越常规计算模式的数百倍，在压缩了芯片单位面积的同时大大增强了芯片的整体强度，这是我们前线地带快速建设的不二之选，这会是我们的终极处理器路线吗?
item.ai-viaon-chip.details = 外星计算元件
item.ai-crystal-processor.name = 晶态处理器
item.ai-crystal-processor.description = 先进的光处理元件，以超人速度处理计算问题。其核心技术在于采用了新型晶体材料制造的拓扑绝缘体。这种材料内部呈现出典型的绝缘体特性，而表面却拥有导体的性质。独特的结构使得信息传递不再依赖于传统的电荷移动，而是通过电子的自旋进行，极大地提升了信息传输效率。\n而传统处理器面临的信号延迟、波形失真以及信号干扰等问题，在晶体处理器面前迎刃而解。晶体处理器利用无电阻、无电容、无电感的革命性设计方案，实现了光学器件通信。光作为最容易实现且不依赖介质传播的物质，成为了信息传递近乎完美的载体，完全避免了信号传输过程中的干扰和损耗。
item.ai-crystal-processor.details = 尖端计算元件
#墙体
block.ai-metal-block.name = 暗金属碎块
block.ai-metal-block.description = 高性能亚原子材料碎块。
block.ai-metal-block.details = 独特的亚原子结构带来的是极致的结构性能，任何不针对亚原子的武器类型都没办法伤其分毫。
block.ai-glass-steel-wall.name = 镀膜玻璃钢墙
block.ai-glass-steel-wall.description = “玻璃钢”这一材料学硕果让我们在防御方面取得了巨大进展。与常规墙体不同，玻璃钢墙体并不是一个大的玻璃钢块结构，而是增添了多角度内衬和复合衬板的全方位装甲块。此外，它也配备了以玻璃钢材料特性为基础构建的基底冲击缓冲构件，专门用于应对电性武器和其他剩余冲击。覆盖金刚烷强化层，可拦截定向能打击并有限反射实弹火力，这些将为我们提供以往无法想象的保护等级。
block.ai-glass-steel-wall.details = 
block.ai-glass-steel-wall-large.name = 大型镀膜玻璃钢墙
block.ai-glass-steel-wall-large.description = “玻璃钢”这一材料学硕果让我们在防御方面取得了巨大进展。与常规墙体不同，玻璃钢墙体并不是一个大的玻璃钢块结构，而是增添了多角度内衬和复合衬板的全方位装甲块。此外，它也配备了以玻璃钢材料特性为基础构建的基底冲击缓冲构件，专门用于应对电性武器和其他剩余冲击。覆盖金刚烷强化层，可拦截定向能打击并有限反射实弹火力，这些将为我们提供以往无法想象的保护等级。
block.ai-glass-steel-wall-large.details = 覆盖金刚烷强化层，可拦截定向能打击并有限反射实弹火力。
block.ai-rejection.name = 强化拒马
block.ai-rejection.description = 一次性反载具防御工事，可以大量建设在防线前端以延缓敌军装甲力量的进攻，为友方火力争取时间。\n\n友方单位靠近自动开合，耐久无法恢复。
block.ai-rejection.details = 请合理控制部署密度以最大化资源利用。
block.ai-pulse-wall.name = 频振墙
block.ai-pulse-wall.description = 超级动能屏障防御块，展开动能屏障保护己方结构并抵挡敌方火力，能提供以往无法想象的保护等级。可抵御超重型混合电磁武器连续射击，对动能武器的防护效果更好，但对电性武器防护效果极差。
block.ai-pulse-wall.details = 利用高频脉冲控制相织布在特定的频段进行震荡，以产生保证尺寸且拥有最大等效强度的实体化膜。
block.ai-pulse-wall-large.name = 大型频振墙
block.ai-pulse-wall-large.description = 超级动能屏障防御块，展开动能屏障保护己方结构并抵挡敌方火力，能提供以往无法想象的保护等级。可抵御超重型混合电磁武器连续射击，对动能武器的防护效果更好，但对电性武器防护效果极差。
block.ai-pulse-wall-large.details =利用高频脉冲控制相织布在特定的频段进行震荡，以产生保证尺寸且拥有最大等效强度的实体化膜。
block.ai-composite-wall.name = 塑性合成墙
block.ai-composite-wall.description = 在钛金结构为主的墙体上加入了塑钢来增强墙体的可塑性，这使墙体可以通过主动溃缩来吸收动能，减弱动能弹对墙体的穿透效果，达到保持墙体内部主结构完好的效果。此外，它对低威力子弹的阻断无视效果是未曾被预料到的。
block.ai-composite-wall.details = 这种设计确实有缺点——动能弹的制动范围相较于其他硬质合金墙体来说变得更大，这也意味着小型的墙体将毫无抗击打能力，只有大型墙体才能够在高压作战环境下起作用。
block.ai-carbon-fiber-reinforced-wall.name = 碳素复合装甲墙
block.ai-carbon-fiber-reinforced-wall.description = 安亚鲁星上的两个文明都在使用的主流被动防御建筑，通过碳操纵技术来对碳纤维增强装甲进行很细微的形变和组合，以此达到阻挡他们穿甲弹的效果。当然，既然是为了他们之间打仗而设计，我们的炮弹对于他们来讲几乎是不可阻挡的，尽管是以爆炸为目的的炮弹，它们从未设想过的当量可以轻易移除那脆性极高、不耐冲击的基座。
block.ai-carbon-fiber-reinforced-wall.details = 我们很清楚，安亚鲁星的土著是不可能拥有这种碳操纵技术的，这类分子级技术对于安亚鲁文明来讲都是非常先进的——看来土著有抵抗我们的意思。没必要全部灭绝他们，我们在安亚鲁星的人口依旧少得可怜——给他们点颜色瞧瞧。
block.ai-adamantane-wall.name = 碳素混合墙
block.ai-adamantane-wall.description = 碳素混合墙最初并不在我们被动防御建筑的规划方案中。但在观察了安亚鲁星两个文明的实际应用后，我们发现这种碳操纵技术在建筑早期防线上具备更高的便捷性与效率。相较于土著与安亚鲁文明内部结构松散的碳素墙，我们在其中嵌入了更多碳素复合材料，采用多种高碳聚合物与高密度烷烃作为内部填料，并以高硬度装甲作为间隙与衬层结构。这使得碳素混合墙在抗冲击与抗穿性能上显著提升，有效弥补了碳素材料质地脆、结构强度不足的问题。其表面覆有金刚烷类镀层，可对子弹产生偏转效果。此外，该墙体结构连接便捷，能够轻松与其他碳素装甲结构融合为整体装甲，从而在理论上无限拓展其装甲与结构强度上限，同时大幅降低维修损耗。
block.ai-adamantane-wall.details = 碳钢

#工厂
