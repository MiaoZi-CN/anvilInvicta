得
block.ai-photoetching-machine.name = 光刻组装线
block.ai-photoetching-machine.description = 全密封构造，一体化的处理器产线，只需要输入原料就可以源源不断的生产先进处理器。
block.ai-photoetching-machine.details = 一拿一放，东拣西装
block.ai-T2-photoetching-machine.name = 压刻模制机
block.ai-T2-photoetching-machine.description = 相较于老旧的光刻技术，光压刻模不再使用更依赖气密性和环境稳定性的各类光成像设备和光蚀基础半导体，而是以光压在散迳子体上进行镌刻，能够在铉晶体表面于20迳子（单个迳子的直径普遍小于电子直径的百分之五）的层面刻制电路。光压精密刻度模能够避免铉晶体的拆解不稳定性对刻蚀设备的损害，并以较高的生产速度满足前线和建设需求。
block.ai-T2-photoetching-machine.details = 超级计算机工厂
block.ai-experimental-machine.name = 研究仪
block.ai-experimental-machine.description = 利用简易的材料制作出的小型无人研究仪，它或许能够帮助我们将附近的数据传输至主机，并封装为数据包输出。
block.ai-experimental-machine.details = 别小瞧了那些便宜的传感器——它确实帮了我们大忙——至少是在我们立足这个星球的前期阶段来说。
block.ai-advanced-smelter.name = 氩弧冶金厂
block.ai-advanced-smelter.description = 能够在一个熔炼车间中进行不同金属炼制的设备，一个安装在内部的计算机能够通过输入材料种类的不同进行不同作业内容。同时，经改进的合金冶炼配方也能让它拥有更高的冶炼效率。\n不得不承认，在我们攻占、掠夺过的如此多的亚光速星球里，它是最棘手的之一。如此大的前线消耗让我们必须尝试新的生产、作战方式——这款机器或许是掠夺途中多线程设备设计的开端。
block.ai-advanced-smelter.details = “这是我们第一次在外星球设计大型多功能车间，在这之前——也在我们的设计之前——只在第一个被我们掠夺的星球发现过这样的设备，那似乎是用来制作大型机器的，而且仅有几个地区有这样的工厂——我们的设计师得到了启发，开始研究起了同样的设计。当第一个原型机床出现在维度镜附近的星球的本土上时，大家都在欢呼——我们不能理解那个被我们掠夺的星球上的家伙，他们似乎很不愿意承认自己所在的地区没有其他地区先进——真是个笑话。”\n——战区负责人  catalpa
block.ai-advanced-compressor.name = 高分子合成机
block.ai-advanced-compressor.description = 高分子材料将会成为更加重要的战略资源，这台基础的高分子材料产线能够暂时缓解前线和后勤建设的需求——它也能够进行多线程作业，快速地生产玻璃钢使生产压力大大减轻——或许它能够替换绝大多数的老旧设备——效率至上。
block.ai-advanced-compressor.details = 可惜的是，建造此工厂必须要塑钢作为原材料，这样才能最大限度的保证压缩泵的气密性。即使它能够更快的制造玻璃钢，但基础的塑钢压缩机仍旧不可少——这大大延长了前线建立和完善的时间。希望工程师们能够设计出其他压缩方案吧。
block.ai-advanced-kiln.name = 夹丝窑炉
block.ai-advanced-kiln.description = 将纳米碳纤管拼组为网状结构，加入热熔的钢化玻璃中。相较于胶合玻璃的工艺而言，这样的夹丝玻璃有相比常规玻璃类材料无与伦比的机械性能。此外，以碳纤维网作为夹丝玻璃填充材料的工艺也是殖民地科学家们的首创，这门工艺使得玻璃板拥有更好的韧性和不易碎性质，进一步扩大了它的用途。
block.ai-advanced-kiln.details = 次世代碳素材料

