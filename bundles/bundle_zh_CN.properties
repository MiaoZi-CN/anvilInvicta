block.ai-tetrad-cracking-engine.name = 热力火轮
block.ai-tetrad-cracking-engine.description = [accent]催化合成炉[]\n先进合成无机发电设备以铜基催化覆层与立体碳结构为核心反应一氧化碳与氢气，制得的高热值合成气与剩余碳结构、空气在燃烧室中湍流共燃，实现固体燃料化学能向热能的最大转化效率。
block.ai-chemo-ring-engine.name = 环热引擎
block.ai-chemo-ring-engine.description = [accent]环热自炼机[]\n利用固体化石燃料发电的设备在等体积比下的效率已经达到了极限。为此，古科公司以石油为原料设计出“环热引擎”的原型机。环热引擎可[accent]脱离石油工业产链[]进行原油蒸馏、重油裂解、延迟焦化，以达到石油燃料在气雾状态下的最佳燃烧配比，以更紧凑、更高效的方式依靠石油发电。[red]\n启动后损毁可能引发大爆炸
block.ai-chemo-ring-engine.details = 煤炭能烧，汽油能烧，柴油能烧，甲烷能烧，乙烯能烧……可以烧一堆混合燃料的热能机？

block.ai-steam-pressurizer.name = 热加压机
block.ai-steam-pressurizer.description = 加压从喷口喷出的蒸汽。 
block.ai-steam-pressurizer.details = 
block.ai-photovoltaic-module.name = 光伏单元
block.ai-photovoltaic-module.description = [accent]硅光矩阵[]\n新一代光伏设备，简化防护结构并改进核心光电转换层后极大幅度地降低了材料冗余。多个光伏单元之间可相互连接，通过共享电路与扩展接口实现[accent]协同工作[]\n从而提升整体发电效率。相比传统“太阳能板”及“大型太阳能板”，效率更高、单位成本更低。高效紧凑的设计也使得单位占地面积下的有效发电面积显著提升。
block.ai-photovoltaic-module.details = 硅犁时代
block.ai-phase-mass-energy-decay-room.name = 相位质能衰变室
block.ai-phase-mass-energy-decay-room.description = 作为首屈一指的前沿科技，它被用于在极短的时间内将物质的相位[accent]直接转换为能量[]\n因为物质的相位与物体的能量和动量密切相关，而在已知的材料中，相位织物基于极高的能量密度被用作衰变的原材料，它能够在极短的时间内产出大量电能。\n尽量让相位质能衰变室远离一切有能量密度差的地块，包括矿产区、地热块甚至是浅水湾——这些地形因素的影响会大大降低相位质能衰变的能量收集速率。\n\n[red]不要试图减少冷却供应，纯能收集罐一旦破裂，附近的一切都会灰飞烟灭！
block.ai-phase-mass-energy-decay-room.details = 如果为了稳定，还是使用聚变反应堆吧
block.ai-high-energy-capacitor.name = 超高能电容器
block.ai-high-energy-capacitor.description = [accent]亚稳电容[]\n新一代蓄能设施将电力输入内部蓄电介质转换为亚稳态粒子团，粒子团密度需严格控制，可以与附近的高能电容器连接并增大存储量。在特定激发条件下使巨浪合金稳定释放电力进行电网调峰。储电时不稳定，注意保护。
block.ai-high-energy-capacitor.details = 能够存储巨量能源是现代文明的基础。
block.ai-T2-power-node.name = 高能电力节点
block.ai-T2-power-node.description = 高能激光节点，有更长的选择距离的更大的连接数量。
block.ai-T2-power-node.details = 串联的电池组当然能为整个电路提供一些电容量，但小心——被击毁的电池组或许会腐蚀附近的建筑！
#核心/辅助
block.ai-prism-core.name = 棱镜核心
block.ai-prism-core.description = [accent]高自动化核心[]\为了能够更快速地在新星球立足并持续探索和扩大战线，远古科技公司以“以量为本”的设计理念，以初代核心为蓝本研制了“棱镜”核心系统。\n\n“棱镜”这一系列的高自动化核心相较于初代核心，其装甲和结构强度较低，取而代之的是更大的物资储存空间、更多的识别带宽以及内置持久反应堆——这也是为了能够批量生产、广泛降落、快速抢夺要点且尽可能的降低成本、增加核心落地后“成活率”的最优设计之一——至少远古科技公司的设计人员是这么说的。
block.ai-prism-core.details = 玻璃产品易碎，请注意轻拿轻放
