#科技
tree.ai-root.name = 中央数据库
tree.ai-.name = 地面战斗体系
tree.ai-.description = 在第35联合舰队的本次作战行动中，我们被派遣至G147-3E星系，目的是在此建立一个大型舰队补给站，因此我们被要求不得使用大规模杀伤性武器，应保全星球地理完整性：由此，在长期进行太空征战的背景下，地面战斗的常规武器研制和作战体系构建必须重新开始。
tree.ai-.name = 高压被动防御架构
tree.ai-.description = 基础的被动防御设施升级仅仅体现在材料的升级和堆叠上。但小墙变成大墙、钍墙变成合金墙这种低效、老旧而粗暴的设计理念早已无法承受当下的高烈度战场——我们非常需要从根本上变革被动防御的设计理念。它代表着我们大大提升的建筑结构强度，但对于非战斗性建筑（如工厂、资源收集装置等）而言，这项科研项目对它们的发展极其有限，也就代表高压被动防御架构是专为军事化而生的科研项。
tree.ai-.name = 高阶火控系统
tree.ai-.description = 高阶火控系统是针对以往基础火控平台的完全变革，其改变在于更高的计算机算力、更多样化的可适配武器配置、更优的火控算法以及光电、波函数、相位等等新型传感器。此类新型火控系统有望大大改变高能武器射程短、精度低、火力持续性差，机炮类武器普遍的射速受限、弹药兼容性能差等等诸多缺点。此外，它们可以更高效的同时锁定多个不同体积、速度的目标，并实时测算其可能的运动轨迹和变轨概率。这将有助于我们提升武器平台的精度与杀伤力。
tree.ai-.name = 物质基础研究
tree.ai-.description = 对物质根本的研究是科技进步的基础。在曾经，物质基础研究被称作“物理学”，但在更新的发现中，一些问题已经超出了物理学所涵盖的范围。它们涉及到化学、生物学、计算机科学、材料学等不同学科的糅杂，单一的“物理”已经无法满足更新的研究。
tree.ai-.name = 前沿材料学
tree.ai-.description = 材料学的进步关联着所有理论向实践的转化，一切高端的科研结果必须依赖于更高级的材料。可以说，科研是文明的大脑，但材料才是骨血。在G147-2和G147-1的战斗中，新材料学的基础理论已经得到完善。鉴于在安亚鲁星愈发残酷和高烈度的战斗形式，我们必须拓展更具优良性能的材料。\n\n此项目是有关材料学科技的必须科研项。
tree.ai-.name = 基座基建工程
tree.ai-.description = 基座基建是通用的在异星的建筑基础，它们是包括工厂、炮塔甚至挖掘设备的根基。基座基建工程涉及内容广泛，泛用性强，但也需要针对某种特定功能的建筑进行单独设计。更优良的建筑基座允许更强大的火力、更高的生产效率为我们服务，在这一阶段的战斗中，它们的重要性不言而喻
tree.ai-.name = 物流运输交通
tree.ai-.description = 物流运输贯穿了自古以来的文明建设，当然也包括在异星的征途。更高效、更快捷的物流将带给文明高速的发展与长足的进步。即使再高的生产效率和火力，面对稀巴烂的后勤物流系统，失败的只能是我们。
tree.ai-.name = 原位采集储备
tree.ai-.description = 对于基础资源的采集并非什么难事，但想要提高效率，就必须在尽管已经发展成熟，但仍旧能加以改进的钻头上下功夫。基础矿物资源的采集效率直接影响了我们的发展和前线稳固程度，是我们占领地区的核心技术——这门技术是即使人人皆知，但仍旧要加力科研的。
tree.ai-.name = 逻辑编译控制
tree.ai-.description = 早期人工智能对文明发展的影响不算很大，但现在我们缺乏人力和劳动力的情况下，几乎一切自主发展都来自也只能来自逻辑控制。无论是高效率的工厂，还是无人的作战单位与炮塔，一切都需要更高的运算效率和更简洁的算法，这些是我们发展的禁锢，也是我们发展的出路。
tree.ai-.name = 次代空天技术
tree.ai-.description = 
tree.ai-.details = 
#地图
珊瑚礁群岛
因本地土著生物实验而创造出的一种特殊藻类占领了整个水面以下的地区。它们掠夺氧气，杀死所有生物后因缺氧进入了休眠期。五彩斑斓、丰富的色素为这个毫无生机的群岛四周添加了唯一的色彩——但没人欣赏这些长得像珊瑚的东西。我们来这里的目的是收集资源，建立首个海运基地，并开发更合该星球气候的核心。分卸这些疯狂繁殖的藻类来给我们的生物科研带来新的方向。
占领这块无人海域——放心，我们要应付的只有海军和它们贫弱不堪的空军。
海岸线
火种B集团军在检测到该区块东部的异常能量密度后，派遣了工程部队在此建立了最基础的防线，并安置了一枚核心。之后，他们将作为先锋部队开赴其他前线，此处将由我们A集团军接管。此地没有任何电子对抗手段，我们完全暴露在敌视野中。请立即建立首批雷达站，保证区块全局检测能力和躲避敌袭击！
注意！该地区有多枚其他火种投下的纯聚变武器，其内部极不稳定，请保护这些被视作“未爆弹”的高危目标，或许它们对我们的支离破碎的核心数据库拓展有极大帮助。
