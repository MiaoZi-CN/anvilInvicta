chip.name = 埃塞克雷达
chip.description = 一种高度先进的复合雷达设施。利用超高频侦测的电波吸收组件和覆盖全频段的物理天线达成对全波段信息的接收。此外，一台重型的干涉量子雷达用于探测匿踪和轨道目标，也可以辅助炮塔锁定敌军单位，被锁定的敌人会试图利用机动脱离。
chip.details = 火眼金睛
