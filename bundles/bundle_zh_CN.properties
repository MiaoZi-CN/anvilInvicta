unit.ai-debtor.name = 毅佣
unit.ai-debtor.description = [accent]轻型悬浮坦克[]\n以低成本与高机动为核心的前线消耗载具，造价相对较低。采用悬浮底盘，无视复杂地形。主武器为一门光子射弹炮，发射高能过载光子弹，命中敌载具后引发剧烈能量崩解，可对其内部元件造成毁灭性打击。在每次射击后，主武器内膛需强制冷却，期间无法开火。适合集群集火射击或穿插骚扰，但不适合与重甲单位正面对峙。
unit.ai-debtor.details = 几何化！几何化！
unit.ai-overdue.name = 碌仆
unit.ai-overdue.description = [accent]重型悬浮坦克[]\n碌仆是专为攻坚与要地防空设计的重装甲单位，悬浮系统使其在恶劣地形中仍能平稳行进，但机动性较差，转向迟钝。碌仆装配一门光子炮用于毁灭敌方目标，以及一发储能式防空飞弹用于应急对空。飞弹仅此一发，发射后即丧失防空能力。若无制空权掩护，极易成为敌方空军目标。适合伴随主力部队推进或守卫关键节点。\n[sky]适合批量部署。
unit.ai-overdue.details = 电涌的弟弟


unit.ai-probe.name = 探针
unit.ai-probe.description = [accent]自律侦察机[]\n为战场情报采集设计的低成本消耗型无人机。凭借高速引擎与轻量化机体，可快速穿越敌方防线，对关键区域实施扫描并将数据实时上传至中央数据库。不设武装，无返航设计，完成任务后即自行销毁。单次使用，无需回收。
unit.ai-probe.details = 几何化！几何化！

unit.ai-entropy.name = 热症
unit.ai-entropy.description = [accent]自律支援炮艇[]\n廉价的消耗型对地支援平台。机身轻巧，机动性极佳，搭载一门热能光束发射器，可对地面轻中甲单位持续烧熔。装甲几乎为零，结构强度仅够承受轻武器流弹。造价低廉，适合批量部署。
unit.ai-entropy.details = 熵之症
unit.ai-vector.name = 矢量
unit.ai-vector.description = [accent]精英自律强击炮艇[]\n专为前线攻坚设计的低空火力平台。挂载热能弹系统，命中后释放高温熔流，对建筑造成持续烧蚀损伤。机身覆盖动能排斥膜，可吸收并转换冲击，抵御防空火炮直射。装甲仍显薄弱，面对中大口径炮火时生存有限。机动性中等，可作为推进单位或定点清除前沿防御阵地。
unit.ai-vector.details = 热能弹系统！射束枪！

unit.ai-sage.name = 贤者
unit.ai-sage.description = [accent]自律光束炮艇[]\n与"镜界"全面竞争时期研制，抛弃所有非必要的防御和功能负重以特化进攻能力。\n在通用设计标准产生前，以具备大批量廉价高进攻型武装为目的，由最疯狂的理念和最疯狂的设计团队一手打造的轻型歼击机。全机70%重量用于装载一台重型伽马加农，可在短时间内对目标造成远超其体型的伤害——相对地，为压低造价，除去一台小型点防御外，机体未配备任何外置防御措施。
unit.ai-sage.details = 
unit.ai-inquiry.name = 问遗
unit.ai-inquiry.description = [accent]自律奇异战机[]\n“问遗”这一机型秉承了“轻量化”的理念，在加强了火力的前提下提升了少量装甲，能够为内部乘员和设备提供更有效的保护——但仅限于小型破片。为了保证“问遗”在正面对敌时的生存性，远古科技公司为其装备了一个近距离能量护盾生成器，能够为其构造三个角度的护盾，以防护动能弹和部分化学能弹——尽管护盾的容量不算大，但实际上没有多少同类型的歼击机能够在击破它的护盾之前活下来。在火力方面，“问遗”配备了一个导弹巢和一门超高能伽马加农，能够在近距离轻易地撕碎敌人。同时，“问遗”配备了更先进的火控计算机，使“问遗”在火力至上的道路上迈出了更大的一步。
unit.ai-inquiry.details = 难以预料的是，“问遗”的机动性并没有达到预期，仅仅只有正面防护的它似乎只能在一对一进行对抗时占上风，因此在进行集群战斗的时候，“问遗”的战损比会变得不可思议的低，外加相对较高的造价，“问遗”理所应当地脱离了市场的需求。为了挽回局面，远古科技公司发布了“问遗应当配合重装甲单位进攻”的声明，这也迫使“问遗”在集群战斗时成为了二线战斗支援舰，根本无法作为主力进攻单位。
unit.ai-memorial.name = 谏稿
unit.ai-memorial.description = [accent]精英自律火力炮艇[]\n搭载聚变枪和导弹巢机构，给敌方基地带来末日。
unit.ai-memorial.details = 
