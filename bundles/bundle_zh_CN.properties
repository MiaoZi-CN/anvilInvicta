block.ai-photoetching-machine.name = 光刻组装线
block.ai-photoetching-machine.description = [accent]一体化光刻线[]\n全密封构造，一体化的处理器产线，使用碳、硅和钛基金属来源源不断的生产先进处理器。
block.ai-photoetching-machine.details = 一拿一放，东拣西装
block.ai-T2-photoetching-machine.name = 压刻模制机
block.ai-T2-photoetching-machine.description = [accent]亚原子级光压镌刻产线[]\n不使用依赖气密性和环境稳定性的傻瓜光成像设备和笨蛋光蚀基础半导体，而是以强化相干光压在散迳子体类气凝胶上进行镌刻，能够在铉晶体表面于20迳子（单个迳子的直径普遍小于电子直径的百分之五）的层面刻制电路。光压精密刻度模能够免铉晶体在刻蚀过程中的结构崩解对"刻蚀"设备的损害，并以较高的生产速度满足前线和建设需求。
block.ai-T2-photoetching-machine.details = 组装者联盟，集结！
block.ai-topo-photon-fab.name = 晶态构造仪
block.ai-topo-photon-fab.description = [accent]光子处理器产线[]\n尖端处理器构造器，需要极长时间来构造自旋-光子纠缠腔，构造后即可快速生产晶体处理器
block.ai-topo-photon-fab.details = 迭代场
block.ai-experimental-machine.name = 研究仪
block.ai-experimental-machine.description = 利用简易的材料制作出的小型无人研究仪，它或许能够帮助我们将附近的数据传输至主机，并封装为数据包输出。
block.ai-experimental-machine.details = 别小瞧了那些便宜的传感器——它确实帮了我们大忙——至少是在我们立足这个星球的前期阶段来说。
block.ai-pseudo-reality-iterator.name = 伪真现实迭代器
block.ai-pseudo-reality-iterator.description = 为了解决超级问题建造的大型迭代设备，由疯子团队设计的大型自动研究设备可以自演化并以疯狂速度模拟现实。
block.ai-pseudo-reality-iterator.details = Great Problem

block.ai-advanced-smelter.name = 氩弧冶金炉
block.ai-advanced-smelter.description = [accent]多功能电弧炉[]\n能够在一个熔炼车间中进行不同金属炼制的柔性逻辑设备一个安装在内部的计算机能够通过输入材料种类的不同进行不同作业内容。同时，经改进的合金冶炼配方也能让它拥有更高的冶炼效率。\n不得不承认，在我们攻占、掠夺过的如此多的亚光速星球里，它是最棘手的之一。如此大的前线消耗让我们必须尝试新的生产、作战方式——这款机器或许是掠夺途中多线程设备设计的开端。
block.ai-advanced-smelter.details = “这是我们第一次在外星球设计大型多功能车间，在这之前——也在我们的设计之前——只在第一个被我们掠夺的星球发现过这样的设备，那似乎是用来制作大型机器的，而且仅有几个地区有这样的工厂——我们的设计师得到了启发，开始研究起了同样的设计。当第一个原型机床出现在我们星球的本土上时，大家都在欢呼——我们不能理解那个被我们掠夺的星球上的家伙，他们似乎很不愿意承认自己所在的地区没有其他地区先进——真是个笑话。”\n——战区负责人  catalpa
#1 浪相复合胚料  2 高脉冲性胚料
block.ai-advanced-compressor.name = 高分子合成机
block.ai-advanced-compressor.description = [accent]高分并行产线[]\n高分子材料将会成为更加重要的战略资源，这台基础的高分子材料产线能够暂时缓解前线和后勤建设的需求——它也能够进行多任务并行作业，快速地生产玻璃钢使生产压力大大减轻——或许它能够替换绝大多数的老旧设备——[accent]效率至上[]\n
block.ai-advanced-compressor.details = 可惜的是，建造此工厂必须要碳钛塑钢作为原材料，这样才能最大限度的保证压缩泵的气密性。即使它能够更快的制造玻璃钢，但基础的塑钢压缩机仍旧不可少——这大大延长了前线建立和完善的时间。希望工程师们能够设计出其他压缩方案吧。
block.ai-advanced-kiln.name = 高级窑炉
block.ai-advanced-kiln.description = [accent]高品质光学产线[]\n将纳米碳纤管拼组为网状结构再在熔融玻璃基液中均匀分布并压制成型。相较于胶合玻璃的工艺而言，这种夹丝玻璃展现出常规玻璃类材料[accent]难以企及[]的机械性能。此外，以碳纤维网作为夹丝玻璃填充材料的工艺也是殖民地科学家们的首创，这门工艺使得玻璃板拥有更好的韧性和抗破碎性能，进一步扩大了它的用途。
block.ai-advanced-kiln.details = 次世代碳素材料

#钻头 为什么抽水机也是钻头？
block.ai-mini-water-extractor.name = MINI抽水机
block.ai-mini-water-extractor.description = 以及其缓慢的速度持续抽水。
block.ai-mini-water-extractor.details = “我叫微型抽水机，我有一个梦想，为宇宙膜激发重组织器和短域规律释放能器提供流体...”
block.ai-fast-drill.name = 高速钻头
block.ai-fast-drill.description = [accent]动能共振钻[]\n对自动化采矿作业系优化后的产物。新型钻头的耐磨面彻底重构，动能钻间隙插入多档位激光刀头和矿物共振模块，使得其能够以几何倍率的速度碎矿开采。新进的配套[accent]石墨烯换热器[]可使用流体进行快速冷却循环，推荐使用高比热容冷却液或液态金属以达到最大开采功率。
block.ai-fast-drill.details = 输入化工液不会爆炸
block.ai-phase-drill.name = 相位钻头
block.ai-phase-drill.description = [accent]偏移采矿设备[]\n先进的相位采矿系统投射一个区域进行采矿作业。\n相位共振学说首次应用于生产实践的伟大杰作。利用相位共振效应的新型采矿系统颠覆了采矿必须覆盖矿物的逻辑，能够直接将有效范围内的矿物从地下偏移至地表。不仅提高了采矿效率，也使得大量被覆盖而无法二次利用的矿床解放出来。
block.ai-phase-drill.details = 尖端的原位采集系统

block.ai-titanium-drill.name = 钛制钻头
block.ai-titanium-drill.description = 可挖掘钛，速度相比气动钻头更快
block.ai-titanium-drill.details = 放轻松，缺钛是正常现象
