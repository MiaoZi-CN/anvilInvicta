onset.power = 为了给等离子钻机提供[accent]电力[]，研究并放置一个\uf73d[accent]激光节点[]。\n它会连接涡轮冷凝器与等离子钻机。
onset.ducts = 研究并放置\uf799[accent]物品管道[]将等离子钻机挖掘的矿物移至核心。\n\n点击并拖动以连续放置物品管道。\n滚动[accent]鼠标滚轮[]以转向。
onset.ducts.mobile = 研究并放置\uf799[accent]物品管道[]将等离子钻机挖掘的矿物移至核心。\n\n长按一秒，然后拖动以连续放置物品管道。
onset.moremine = 扩大挖掘规模。\n放置更多的等离子钻机，并用激光节点与物品管道来使它们正常工作。\n挖掘200铍。
onset.graphite = 要建造更高级的建筑，需要\uf835[accent]石墨[]。\n使用等离子钻机挖掘石墨。
onset.research2 = 开始研究[accent]工厂[]。\n研究\uf74d[accent]墙壁粉碎机[]和\uf779[accent]电弧硅炉[]。
onset.arcfurnace = 电弧硅炉需要\uf834[accent]沙[]与\uf835[accent]石墨[]以冶炼\uf82f[accent]硅[]。\n它也需要[accent]电力[]。
onset.crusher = 使用\uf74d[accent]墙壁粉碎机[]挖掘沙。
onset.fabricator = 使用[accent]单位[]探索地图，进行防御，发动攻击。\n研究并放置一个\uf6a2[accent]坦克制造厂[]。
onset.makeunit = 生产单位。\n点击"?"以显示生产单位所需资源。
onset.turrets = 使用单位防御很有效，但合理使用[accent]炮塔[]可以提供更好的防御力。\n放置一个\uf6eb[accent]撕裂[]。\n炮塔需要供给\uf748[accent]弹药[]。
onset.turretammo = 给炮塔供给[accent]铍[]。
onset.walls = [accent]墙[]可以防止建筑受到伤害。\n在炮塔周围放置一些\uf6ee[accent]铍墙[]。
onset.enemies = 敌人来袭，准备防御。
onset.attack = 敌军基地十分脆弱。 发动反攻。
onset.cores = 你可以在[accent]核心地块[]上建造新的核心。\n新核心的功能类似于前沿基地，且与其他核心共享资源仓库。\n放置一个\uf725核心。
onset.detect = 敌军将在2分钟内发现你。\n设立防御，挖掘矿物，并建造生产设施。

split.pickup = 核心单位可以拾取一些方块。\n拾取这个[accent]强化容器[]并将其放到[accent]载荷装载器[]中。\n（默认使用[拾取，]放下载荷）
split.pickup.mobile = 核心单位可以拾取一些方块。\n拾取这个[accent]强化容器[]并将其放到[accent]载荷装载器[]中。\n（长按以拾取或放下载荷）
split.acquire = 你需要获取钨来生产单位。
split.build = 单位必须被运输到墙的另一侧。\n在墙壁两侧各放置一个[accent]载荷质量驱动器[]。\n点击其中一个，然后点击另一个以连接它们。
split.container = 与强化容器类似，单位也可以使用[accent]载荷质量驱动器[]运输。\n在载荷质量驱动器旁放置单位制造厂以向其装载单位，然后将单位运输到墙的另一侧，摧毁敌方基地。

item.copper.description = 用于建造大多数建筑，或作为弹药使用。
item.copper.details = 铜，塞普罗星上异常丰富的金属。 不经处理的话，结构很脆弱。
item.lead.description = 用于建造液体输送和电力相关的建筑。
item.lead.details = 致密，惰性，广泛用于电池中。 \n注意：可能对生命体有毒，虽说这里已经没有多少生物了。
item.metaglass.description = 用于建造输送或储存液体的建筑。
item.graphite.description = 用于制造电子元件，或作为炮塔弹药。
item.sand.description = 用于生产其他精炼材料。
item.coal.description = 用作燃料，或用于精炼材料生产。
item.coal.details = 植物的化石，在孢子出现很久前就形成了。
item.titanium.description = 用于液体输送建筑、 钻头和工厂。
item.thorium.description = 用于耐用建筑以及作为核燃料。
item.scrap.description = 用于在熔炉和粉碎机中精炼成其他材料。
item.scrap.details = 废旧建筑和单位的残骸。
item.silicon.description = 从电气元件到工业军事，[yellow]万物起源
item.plastanium.description = 用于高级单位、 绝缘材料，或作为分裂性弹药。
item.phase-fabric.description = 用于高级电子设备和自修复建筑。
item.surge-alloy.description = 用于先进武器和反应防御建筑，导电性能极佳。
item.spore-pod.description = 用于转化成石油、 爆炸混合物或作为燃料。
item.spore-pod.details = 孢子。 人工合成的生命形式，释放对其他生物有毒的气体，极具侵略性。 在某些条件下高度易燃。
item.blast-compound.description = 用作炸弹或爆炸性弹药。
item.pyratite.description = 用于火焰发射类武器和使用燃料的发电设备。

#埃里克尔
item.beryllium.description = 用于埃里克尔的多种建筑和弹药。
item.tungsten.description = 用于钻头、 装甲和弹药。 用于建造更先进的建筑。
item.oxide.description = 用作热导体和绝缘体。
item.carbide.description = 用于先进的建筑、 重型单位和弹药。

liquid.water.description = 用于冷却机器和废物处理。
liquid.slag.description = 在分离器中提炼成金属成分，或作为武器弹药喷向敌人。
liquid.oil.description = 用于先进材料生产和喷射类武器。
liquid.cryofluid.description = 用作反应堆、 炮塔和工厂的冷却剂。

#埃里克尔
liquid.arkycite.description = 用于发电和合成材料的化学反应。
liquid.ozone.description = 用作材料生产的氧化剂和燃料。 有一定爆炸性。
liquid.hydrogen.description = 用于资源开采、 单位生产和结构修复。 易燃。
liquid.cyanogen.description = 用于构建高级建筑和单位，也用作弹药。 高度易燃。
liquid.nitrogen.description = 用于资源开采、 气体生产和单位生产。
liquid.neoplasm.description = 瘤变反应堆产出的危险生物性副产物。 会很快扩散至它能接触到的含水方块并破坏它们。 有粘性。
liquid.neoplasm.details = 瘤液。 由一种无法控制并快速分裂的合成细胞团组成，具有污泥状的粘稠度。 耐热。 对任何含有水的结构极为危险。\n\n从标准分析来看过于复杂和不稳定，潜在的应用未知。 建议在矿渣池中焚毁。

block.derelict = \uf77e[lightgray]废墟
block.armored-conveyor.description = 向前运输物品，不接受侧面输入，除非来自其他传送带。
block.illuminator.description = 提供照明。
block.message.description = 保存文字信息，用于队友间进行交流。
block.reinforced-message.description = 保存文字信息，用于队友间进行交流。
block.world-message.description = 一个用于制图的信息板。 无法被摧毁。
block.graphite-press.description = 将煤炭压缩为石墨。
block.multi-press.description = 将煤炭压缩为石墨，需要水进行冷却。
block.silicon-smelter.description = 将沙和煤炭精炼为硅。
block.kiln.description = 将沙和铅熔炼为钢化玻璃。
block.plastanium-compressor.description = 用石油和钛生产塑钢。
block.phase-weaver.description = 用钍和沙合成相织布。
block.surge-smelter.description = 将钛、 铅、 硅和铜熔炼成巨浪合金。
block.cryofluid-mixer.description = 将水和细钛粉混合制成冷冻液。
block.blast-mixer.description = 利用硫化物和孢子荚生产爆炸混合物。
block.pyratite-mixer.description = 把煤炭、 铅和沙子混合成硫化物。
block.melter.description = 将废料熔化成矿渣液。
block.separator.description = 将矿渣液分离成矿物成分。
block.spore-press.description = 将孢子荚压缩成石油。
block.pulverizer.description = 将废料粉碎成细沙。
block.coal-centrifuge.description = 把石油变成煤炭。
block.incinerator.description = 熔融并蒸发它接收到的任何物品或液体。
block.power-void.description = 消耗输入的所有电力，仅限沙盒。
block.power-source.description = 无限输出电力，仅限沙盒。
block.item-source.description = 无限输出物品，仅限沙盒。
block.item-void.description = 销毁输入的所有物品，仅限沙盒。
block.liquid-source.description = 无限输出液体，仅限沙盒。
block.liquid-void.description = 蒸发输入的所有液体，仅限沙盒。
block.payload-source.description = 无限输出载荷，仅限沙盒。
block.payload-void.description = 销毁输入的所有载荷，仅限沙盒。
block.copper-wall.description = 保护己方建筑，挡下敌方炮弹。
block.copper-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.titanium-wall.description = 保护己方建筑，挡下敌方炮弹。
block.titanium-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.plastanium-wall.description = 保护己方建筑，挡下敌方炮弹。 能吸收激光和电弧，但也会阻止电力节点自动连接。
block.plastanium-wall-large.description = 保护己方建筑，挡下敌方炮弹。 能吸收激光和电弧，但也会阻止电力节点自动连接。
block.thorium-wall.description = 保护己方建筑，挡下敌方炮弹。
block.thorium-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.phase-wall.description = 保护己方建筑，挡下敌方炮弹。 受大多数子弹攻击时有概率将其反弹。
block.phase-wall-large.description = 保护己方建筑，挡下敌方炮弹。 受大多数子弹攻击时有概率将其反弹。
block.surge-wall.description = 保护己方建筑，挡下敌方炮弹。 受攻击时间断释放电弧。
block.surge-wall-large.description = 保护己方建筑，挡下敌方炮弹。 受攻击时间断释放电弧。
block.door.description = 可以开关的墙。
block.door-large.description = 可以开关的墙。
block.mender.description = 定期修复附近的建筑。\n可使用硅提高范围和效率。
block.mend-projector.description = 定期修复附近的建筑。\n可使用相织布提高范围和效率。
block.overdrive-projector.description = 提升附近建筑的工作效率。\n可使用相织布提高范围和效率。
block.force-projector.description = 在自身周围投影一个六边形动能排斥场，使里面的建筑和单位免受伤害，由于是直接通过"强扭转"来产生动能排斥场，耗能高的同时热量产生极大，同时由于材料学不发达导致热量桥接部分十分容易融毁，性能堪忧。
block.shock-mine.description = 对踩到它的敌人释放电弧进行攻击。
block.conveyor.description = 向前运输物品。
block.titanium-conveyor.description = 向前运输物品，比初级传送带更快。
block.plastanium-conveyor.description = 打包物品进行运输。\n从后方输入物品，三个方向输出物品。 需要多个装载和卸载点才能达到最大吞吐量。
block.junction.description = 两条交叉传送带的桥梁。
block.bridge-conveyor.description = 跨越任意地形或建筑运输物品。
block.phase-conveyor.description = 跨越任意地形或建筑即时运输物品。 比传送带桥范围更大，但需要电力。
block.sorter.description = 如果物品与所选种类相同，则允许其通过。 否则，物品将向两侧输出。
block.inverted-sorter.description = 像分类器一样处理物品，不过是向两侧输出所选的物品。
block.router.description = 将物品平均分配到其他3个方向。
block.router.details = 这是个好东西，但也会带来麻烦。 不建议在工厂旁边使用，因为它们会被产出堵塞。
block.distributor.description = 将物品平均分配到其他7个方向。
block.overflow-gate.description = 当前方被阻塞时才会向两侧输出，用于处理多余的物品。
block.underflow-gate.description = 与溢流门相反，当两侧均堵塞时才向前运输。
block.mass-driver.description = 远距离物品传输建筑，收集若干物品后将其发射到远处的另一个质量驱动器。
block.mechanical-pump.description = 泵送液体，不需要电力。
block.rotary-pump.description = 泵送液体，需要电力。
block.impulse-pump.description = 泵送液体。
block.conduit.description = 向前传输液体。 与泵或者其他导管联合使用。
block.pulse-conduit.description = 向前传输液体。 比普通导管传输液体更快，且能储存更多液体。
block.plated-conduit.description = 向前传输液体，不接受侧面输入。 不会发生泄漏。
block.liquid-router.description = 接受一个方向的液体输入，并平均输出到其他3个方向。 可以储存一定量的液体。
block.liquid-container.description = 储存数量可观的液体，并像液体路由器一样朝各个方向输出液体。
block.liquid-tank.description = 储存大量的液体，并像液体路由器一样朝各个方向输出液体。
block.liquid-junction.description = 两条交叉导管的桥梁。
block.bridge-conduit.description = 跨越任意地形或建筑物传输液体。
block.phase-conduit.description = 跨越任意地形或建筑物传输液体。 比导管桥范围更大，但需要电力。
block.power-node.description = 向连接的其他节点传输电力，也能从相邻的建筑接收电力或向其供电。
block.power-node-large.description = 连接范围更大的高级电力节点。
block.surge-tower.description = 用于远距离连接的电力节点，但连接数较少。
block.diode.description = 单向传输电力，仅当此方向上电力储备较少时起作用。
block.battery.description = 储存电网多余电力，并在电网供电不足时放电。
block.battery-large.description = 储存电网多余电力，并在电网供电不足时放电。 比中型电池容量更高。
block.combustion-generator.description = 燃烧煤炭之类的可燃材料发电。
block.thermal-generator.description = 放置在炽热的地形上能够发电。
block.steam-generator.description = 通过燃烧易燃材料并将水转化为蒸汽发电。
block.differential-generator.description = 利用低温流体与燃烧的硫化物之间的温差产生大量电力。
block.rtg-generator.description = 利用放射物衰变产生的热量缓慢地产生电力。
block.solar-panel.description = 利用太阳能产生少量电力。
block.solar-panel-large.description = 利用太阳能产生少量电力，比标准太阳能电池板更高效。
block.thorium-reactor.description = 从放射性的钍中产生大量的电力，需要持续冷却。 如果冷却液供应不足，会剧烈爆炸。
block.impact-reactor.description = 达到最高效率时能产生巨量电力，但启动时也需要输入大量电力。
block.mechanical-drill.description = 放置在矿物上时，以缓慢的速度无限输出物品。 只能开采基本资源。
block.pneumatic-drill.description = 一种改进的钻头，能开采钛。 采矿速度比机械钻头快。
block.laser-drill.description = 通过激光技术更快地开采，但需要电力。 这种钻头可以开采放射性的钍。
block.blast-drill.description = 高级钻头，需要大量电力来爆掘矿物，可挖掘的矿物等级并不高。
block.water-extractor.description = 从地下提取水，适用于附近没有地表水的情况。
block.cultivator.description = 将大气中低浓度的孢子培养成孢子荚。
block.cultivator.details = 一种失传已久的技术，用于尽可能高效地生产大量生物质。 现在覆盖了塞普罗的孢子，最初的培养设备可能就是它。
block.oil-extractor.description = 使用沙子、 水和大量电力钻取石油。
block.core-shard.description = 基地的核心。 一旦被摧毁，此区块就会丢失。装逼会直接被对面打飞
block.core-shard.details = 初代核心，坚固且能够自我维持。 不具备星际旅行的能力。
block.core-foundation.description = 基地的核心。 装甲优良。 容量比初代核心更大。量子叠加态的装逼 
block.core-foundation.details = 次代核心。
block.core-nucleus.description = 基地的核心。 装甲极佳，容量极大。装逼能让对面飞起来 
block.core-nucleus.details = 三代是不终代核心。OwO
block.vault.description = 少量存储各种类型的物品。 可使用装卸器卸载物品。
block.container.description = 极少量存储各种类型的物品。 可使用装卸器卸载物品。
block.unloader.description = 从周围的建筑卸载指定物品。
block.launch-pad.description = 将货物发射至指定区块。
block.launch-pad.details = 用于资源点对点运输的亚轨道系统。 载荷仓很脆弱，再入大气时无法保留。
block.duo.description = 交替向敌人发射子弹。
block.scatter.description = 向敌方战机发射铅、 废料或钢化玻璃高射炮弹。
block.scorch.description = 焚烧任何靠近它的地面敌人。 近距离内十分有效。
block.hail.description = 向远距离地面敌人发射小型炮弹。
block.wave.description = 向敌人喷射液体流。 使用水作弹药时能够自动灭火。
block.lancer.description = 充能并向地面单位发射强力能量束。
block.arc.description = 向地面单位发射电弧。
block.swarmer.description = 向敌人发射追踪导弹。
block.salvo.description = 快速地向敌人齐射子弹。(这个不如白炮t2伤害高)
block.fuse.description = 向附近的敌人发射三发近距离穿透性爆炸子弹。
block.ripple.description = 向远距离地面敌人发射密集的炮弹。
block.cyclone.description = 向附近的敌人发射密集的爆炸子弹。
block.spectre.description = 向空中和地面目标发射大型穿甲子弹。
block.meltdown.description = 充能并向附近的敌人发射持续的激光束。 需要冷却液。
block.repair-point.description = 持续修复范围内受损的单位。
block.segment.description = 摧毁来袭的子弹或导弹，对激光无效。
block.parallax.description = 通过牵引光束拉扯空中目标，并对其造成伤害。
block.tsunami.description = 向敌人喷射强力的液体流。 使用水作弹药时能够自动灭火。
block.silicon-crucible.description = 从沙子和煤中提炼硅，用硫化物作为附加热源。 在炙热地形上更高效。
block.disassembler.description = 以低效率将矿渣液分离成微量的外来矿物成分。 能产生钍。
block.overdrive-dome.description = 提高附近建筑物的工作效率。 需要相织布和硅。
block.payload-conveyor.description = 运送大型载荷，例如从工厂生产的单位。
block.payload-router.description = 将输入的载荷向3个方向轮流输出。
block.ground-factory.description = 生产陆军单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.air-factory.description = 生产空军单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.naval-factory.description = 生产海军单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.additive-reconstructor.description = 将输入的单位升级到第二级。
block.multiplicative-reconstructor.description = 将输入的单位升级到第三级。
block.exponential-reconstructor.description = 将输入的单位升级到第四级。
block.tetrative-reconstructor.description = 将输入的单位升级到第五级，即最终极。
block.switch.description = 可切换的开关。 开关状态可以用逻辑处理器读取和控制。
block.micro-processor.description = 循环运行一系列逻辑指令，可用于控制单位和建筑物。
block.logic-processor.description = 循环运行一系列逻辑指令，可用于控制单位和建筑物。 比微型处理器更快。
block.hyper-processor.description = 循环运行一系列逻辑指令，可用于控制单位和建筑物。 比逻辑处理器更快。
block.memory-cell.description = 存储处理器的信息。
block.memory-bank.description = 存储处理器的信息。 容量更大。
block.logic-display.description = 显示处理器中绘制的各种图像。
block.large-logic-display.description = 显示处理器中绘制的各种图像。
block.interplanetary-accelerator.description = 一个巨大的电磁轨道加速器。 将核心加速至逃逸速度以进行星际部署。
block.repair-turret.description = 持续修复范围内受损的单位。 可以用冷却液强化。
block.payload-propulsion-tower.description = 远距离载荷运送建筑。 向相连的其他载荷驱动器发射载荷。

#埃里克尔
block.core-bastion.description = 基地的核心。 拥有装甲。 一旦被摧毁，此区块就会丢失。
block.core-citadel.description = 基地的核心。 装甲优良。 容量比城堡核心更大。
block.core-acropolis.description = 基地的核心。 装甲极佳。 容量比堡垒核心更大。
block.breach.description = 向敌人发射铍或钨穿透子弹。
block.diffuse.description = 向前方锥形区域发射子弹。 并把敌人击退。
block.sublimate.description = 向敌人持续喷射火焰。 穿透敌方装甲。
block.titan.description = 向地面敌人发射巨大的爆炸炮弹。 需要氢气。
block.afflict.description = 向敌人发射巨大的带电碎片弹。 需要热量。
block.disperse.description = 向空中敌人发射高射炮弹。
block.lustre.description = 向敌人发射慢速单目标激光。
block.scathe.description = 向地面敌人发射威力强大的远程导弹。
block.smite.description = 向敌人发射放电穿透子弹。
block.malign.description = 向敌方发射一连串的激光导弹。 需要大量热量。
block.silicon-arc-furnace.description = 将沙和石墨精炼成硅。
block.oxidation-chamber.description = 将铍和臭氧转化为氧化物。 副产出热量。
block.electric-heater.description = 加热朝向的建筑。 需要大量电力。
block.slag-heater.description = 加热朝向的建筑。 需要矿渣。
block.phase-heater.description = 加热朝向的建筑。 需要相织布。
block.heat-redirector.description = 将累积的热量传输到其他建筑。
block.heat-router.description = 将累积的热量平均分配到其它3个方向。
block.electrolyzer.description = 将水电解为氢和臭氧气体。
block.atmospheric-concentrator.description = 从大气中浓缩氮气。 需要热量。
block.surge-crucible.description = 用矿渣和硅合成巨浪合金。 需要热量。
block.phase-synthesizer.description = 用钍、 沙子和臭氧合成相织布。 需要热量。
block.carbide-crucible.description = 将石墨和钨熔炼为碳化物。 需要热量。
block.cyanogen-synthesizer.description = 用芳油和石墨合成氰气。 需要热量。
block.slag-incinerator.description = 焚烧稳定的物品和液体。 需要矿渣。
block.vent-condenser.description = 将排出的水蒸气冷凝成水。 消耗电力。
block.plasma-bore.description = 面向矿壁放置时，以缓慢的速度无限产出物品。 需要少量电力。
block.large-plasma-bore.description = 更大的等离子钻机。 能够开采钨和钍。 需要氢气和电力。
block.cliff-crusher.description = 粉碎墙壁，以缓慢的速度无限产出沙子。 需要电力。 效率因墙的类型而异。
block.impact-drill.description = 放置在矿物上时，以缓慢的速度无限产出物品。 需要电力和水。
block.eruption-drill.description = 改进过的冲击钻头。 能够开采钍。 需要氢。
block.reinforced-conduit.description = 向前传输流体。 不接受侧面的非导管输入。
block.reinforced-liquid-router.description = 将流体平均分配到所有侧面方向。
block.reinforced-junction.description = 两条交叉物品管道的桥梁。
block.reinforced-liquid-tank.description = 储存大量的流体。
block.reinforced-liquid-container.description = 储存数量可观的流体。
block.reinforced-bridge-conduit.description = 跨越任意地形或建筑物传输流体。
block.reinforced-pump.description = 泵送液体。 需要氢气。
block.beryllium-wall.description = 保护己方建筑，挡下敌方炮弹。
block.beryllium-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.tungsten-wall.description = 保护己方建筑，挡下敌方炮弹。
block.tungsten-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.carbide-wall.description = 保护己方建筑，挡下敌方炮弹。
block.carbide-wall-large.description = 保护己方建筑，挡下敌方炮弹。
block.reinforced-surge-wall.description = 保护己方建筑，挡下敌方炮弹。 受攻击时间断释放电弧。
block.reinforced-surge-wall-large.description = 保护己方建筑，挡下敌方炮弹。 受攻击时间断释放电弧。
block.shielded-wall.description = 保护己方建筑，挡下敌方炮弹。 创建一个力场，并在通电时吸收大部分炮弹。 可以传导电力。
block.blast-door.description = 当己方地面单位在范围内时自动打开的墙。 无法手动控制。
block.duct.description = 向前运输物品。 只能存储一个物品。
block.armored-duct.description = 向前运输物品。 不接受侧面的非管道输入。
block.duct-router.description = 将物品平均分配到其它3个方向。 只接受背面的物品。 可被配置为分类器。
block.overflow-duct.description = 当前方被堵塞时才会向两侧输出，用于处理多余的物品。
block.duct-bridge.description = 跨越任意地形或建筑物传输物品。
block.duct-unloader.description = 从背后的建筑卸载指定物品。 无法从核心卸载。
block.underflow-duct.description = 与溢流管道相反。 当两侧均堵塞时才向前运输。
block.reinforced-liquid-junction.description = 两条交叉强化导管的桥梁。
block.surge-conveyor.description = 打包物品进行运输。 可以用电力加速。 可以传导电力。
block.surge-router.description = 将合金传送带上的物品平均分配到其它3个方向。 可以用电力加速。 可以传导电力。
block.unit-cargo-loader.description = 建造货运无人机。 无人机通过需求自动将物品分配到单位物流卸载点。
block.unit-cargo-unload-point.description = 作为货运无人机的卸货点。接受需求的物品。
block.beam-node.description = 向其他互相垂直的节点传输电力。 存储少量电力。
block.beam-tower.description = 向其他互相垂直的节点传输电力。 存储大量电力。 连接距离远。
block.turbine-condenser.description = 当放置在喷口上时产生电力。 同时产生少量水。
block.chemical-combustion-chamber.description = 利用芳油和臭氧发电。
block.pyrolysis-generator.description = 使用矿渣热解芳油产生大量电力。 同时产生水。
block.flux-reactor.description = 在加热时产生大量电力。 需要氰气作为稳定剂。 电力输出和氰气需求与热量输入成比例。\n如果提供的氰气不足则会爆炸。
block.neoplasia-reactor.description = 利用芳油、 水和相织布产生大量电力。 同时产生热量和危险的瘤液。\n如果瘤液未通过导管从反应堆中移除，则会剧烈爆炸。
block.build-tower.description = 自动重建范围内的建筑，并在其他单位进行建造时提供协助。
block.regen-projector.description = 在方形范围内缓慢修复己方建筑。 需要氢气。
block.reinforced-container.description = 少量存储各种类型的物品。 可使用卸载器卸载物品。 不会增加核心存储容量。
block.reinforced-vault.description = 大量存储各种类型的物品。 可使用卸载器卸载物品。 不会增加核心存储容量。
block.tank-fabricator.description = 生产坦克单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.ship-fabricator.description = 生产飞船单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.mech-fabricator.description = 生产机甲单位。 产出的单位可以直接投入战场，也可以送入重构工厂进行升级。
block.tank-assembler.description = 利用输入的方块和单位组装大型坦克。 可以通过添加基本装配厂模块来增加输出等级。
block.ship-assembler.description = 利用输入的方块和单位组装大型飞船。 可以通过添加基本装配厂模块来增加输出等级。
block.mech-assembler.description = 利用输入的方块和单位组装大型机甲。 可以通过添加基本装配厂模块来增加输出等级。
block.tank-refabricator.description = 将输入的坦克单位升级到第二级。
block.ship-refabricator.description = 将输入的飞船单位升级到第二级。
block.mech-refabricator.description = 将输入的机甲单位升级到第二级。
block.prime-refabricator.description = 将输入的单位升级到第三级。
block.basic-assembler-module.description = 当放置在构造边界旁边时，增加输出等级。 需要电力。 可以用作载荷输入。
block.small-deconstructor.description = 解构方块和单位，返还100%资源。
block.reinforced-payload-conveyor.description = 向前运输载荷。
block.reinforced-payload-router.description = 将载荷向3个方向轮流输出。设置载荷时可用作分类器。
block.payload-mass-driver.description = 远距离荷载运输建筑。 向相连的其它载荷质量驱动器发射载荷。
block.large-payload-mass-driver.description = 远距离荷载运输建筑。 向相连的其它大型载荷质量驱动器发射载荷。
block.unit-repair-tower.description = 修复附近的所有单位。 需要臭氧。
block.radar.description = 逐渐发现大范围内的地形和敌人单位。 需要电力。
block.shockwave-tower.description = 破坏和摧毁半径范围内的敌人炮弹。 需要氰气。
block.canvas.description = 显示使用预定义的调色板绘制的图像。 可手动编辑。

unit.dagger.description = 向敌人发射标准子弹。
unit.mace.description = 向敌人喷射火焰。
unit.fortress.description = 向地面敌人发射远程火炮。
unit.scepter.description = 向敌人快速发射带电子弹。
unit.reign.description = 向敌人快速发射大型穿透子弹。
unit.nova.description = 发射激光弹攻击敌人并修复己方建筑。 能够助推。
unit.pulsar.description = 发射电弧攻击敌人并修复己方建筑。 能够助推。
unit.quasar.description = 发射穿透性激光束攻击敌人并修复己方建筑。 能够助推。 拥有护盾。
unit.vela.description = 发射巨大的持续激光束攻击敌人并引起燃烧，修复己方建筑。 能够助推。
unit.corvus.description = 发射巨大的爆发激光束，摧毁敌人并修复己方建筑。 可以跨越大多数地形。
unit.crawler.description = 冲向敌人并自毁，造成大范围爆炸。
unit.atrax.description = 向地面目标发射削弱性的球状矿渣液。 可以跨越大多数地形。
unit.spiroct.description = 向敌人发射较弱的激光束，并在此过程中自我修复。 可以跨越大多数地形。
unit.arkyid.description = 向敌人发射大型激光束，并在此过程中自我修复。 可以跨越大多数地形。
unit.toxopid.description = 向敌人发射大型带电集束炮弹和穿透性激光。 可以跨越大多数地形。
unit.flare.description = 向地面敌人发射标准子弹。
unit.horizon.description = 向正下方的地面敌人投掷炸弹。
unit.zenith.description = 向敌人发射多枚导弹。
unit.antumbra.description = 向敌人发射密集的子弹。
unit.eclipse.description = 向敌人发射穿透性激光和爆炸性炮弹。
unit.mono.description = 自动开采铜和铅，并将其放入核心中。
unit.poly.description = 自动重建被摧毁的建筑，并协助其他单位进行建造。
unit.mega.description = 自动修复受损建筑。 能够携带建筑和小型地面单位。
unit.quad.description = 向地面目标投掷等离子炸弹，修复己方建筑并摧毁敌人。 能够携带中型地面单位。
unit.oct.description = 用它的再生护盾保护附近的己方单位。 能够携带大多数地面单位。
unit.risso.description = 向敌人发射一串导弹和子弹。
unit.minke.description = 向敌人发射炮弹和标准子弹。
unit.bryde.description = 向敌人发射远程炮弹和导弹。
unit.sei.description = 向敌人发射一串导弹和穿甲弹。
unit.omura.description = 向敌人发射远程穿透轨道炮。 自动生产星辉单位。
unit.alpha.description = 保护初代核心，可建造建筑。
unit.beta.description = 保护次代核心，可建造建筑。
unit.gamma.description = 保护三代核心，加装机炮和小型导弹巢，可建造建筑。
unit.retusa.description = 向敌人发射追踪鱼雷，并修复己方单位。
unit.oxynoe.description = 向敌人发射火焰束，并修复己方建筑。 搭载一台单点防御炮塔，能够防御来袭的子弹。
unit.cyerce.description = 向敌人发射追踪集束导弹，并修复己方单位。 
unit.aegires.description = 产生能量场，使范围内的敌方建筑与单位受到电击，对己方则进行修复。 
unit.navanax.description = 发射大型电磁爆弹，对敌方电网造成显著破坏并修复己方建筑。 搭载4台自动激光炮台，能熔化靠近的敌人。 

#埃里克尔
unit.stell.description = 向敌人发射普通子弹。
unit.locus.description = 向敌人交替发射子弹。
unit.precept.description = 向敌人发射穿透性集束子弹。
unit.vanquish.description = 向敌人发射大型穿透性分裂子弹。
unit.conquer.description = 向敌人发射大量大型穿透性子弹。
unit.merui.description = 向地面敌人发射远程火炮。 可以跨越大多数地形。 
unit.cleroi.description = 向敌人发射双发炮弹。 搭载一台单点防御炮塔，能够防御来袭的子弹。 可以跨越大多数地形。 
unit.anthicus.description = 向敌人发射远程追踪导弹。 可以跨越大多数地形。 
unit.tecta.description = 向敌人发射等离子追踪导弹。 用它前方的护盾保护自己。 可以跨越大多数地形。 
unit.collaris.description = 向敌人发射远程分裂火炮。 可以跨越大多数地形。 
unit.elude.description = 向敌人发射螺旋状追踪子弹。 可以在液体上悬浮。
unit.avert.description = 向敌人发射螺旋状扭曲子弹。
unit.obviate.description = 向敌人发射螺旋状闪电球。
unit.quell.description = 向敌人发射远程追踪导弹。 能够压制敌方修复建筑。
unit.disrupt.description = 向敌人发射远程压制性追踪导弹。 能够压制敌方修复建筑。
unit.evoke.description = 保护城堡核心，可建造建筑。 使用激光束修复建筑。
unit.incite.description = 保护堡垒核心，可建造建筑。 使用激光束修复建筑。
unit.emanate.description = 保护卫城核心，可建造建筑。 使用一对激光束修复建筑。

lst.read = 从连接的内存读取数字
lst.write = 向连接的内存写入数字
lst.print = 添加文字到打印缓存\n使用[accent]Print Flush[]后才会真正显示
lst.draw = 添加绘图操作到绘图缓存\n使用[accent]Draw Flush[]后才会真正显示
lst.drawflush = 将绘图缓存中的[accent]Draw[]队列刷新到显示屏
lst.printflush = 将打印缓存中的[accent]Print[]队列刷新到信息板
lst.getlink = 获取与处理器连接的建筑\n建筑编号从0开始
lst.control = 控制建筑
lst.radar = 让建筑搜寻感知范围内的单位
lst.sensor = 从建筑或者单位中获取数据
lst.set = 给变量赋值
lst.operation = 使用1至2个参数执行运算/函数
lst.end = 跳转至第一条指令
lst.wait = 等待指定的秒数
lst.stop = 停止该处理器的运行
lst.lookup = 根据ID查阅一种物品/液体/单位/建筑\n各个分类中的项目总数是\n[accent]@unitCount[] / [accent]@itemCount[] / [accent]@liquidCount[] / [accent]@blockCount[]
lst.jump = 根据条件判断，决定是否跳转至另一条指令
lst.unitbind = 绑定某个类型的下一个单位，或直接绑定指定的单位\n并保存至[accent]@unit[]
lst.unitcontrol = 控制已绑定的单位
lst.unitradar = 让绑定的单位搜寻感知范围内的其他单位
lst.unitlocate = 让绑定的单位搜寻整个地图中特定的建筑或位置
lst.getblock = 获取任意位置的地块数据
lst.setblock = 设置任意位置的地块数据
lst.spawnunit = 在指定位置生成单位
lst.applystatus = 添加或清除单位的一个状态效果
lst.spawnwave = 在任意位置生成一波敌人\n并不记录在波数计数器中
lst.explosion = 在某个位置生成爆炸
lst.setrate = 在指令/时间刻的时间下设置处理器处理速度
lst.fetch = 按索引查找单位、 核心、 玩家或建筑物\n索引从 0 开始，以其返回的计数结束
lst.packcolor = 将[0,1]范围内的RGBA分量整合成单个数字，用于绘图或规则设置
lst.setrule = 设置地图规则
lst.flushmessage = 在屏幕中央投影文字缓存区的内容\n会等待上一个文字显示结束
lst.cutscene = 控制玩家游戏视角
lst.setflag = 设置一个可以被所有处理器读取的全局flag
lst.getflag = 检查是否设置了全局flag

logic.nounitbuild = [red]此处不允许处理器操控单位去建设

lenum.type = 建筑和单位的类型，返回一个“类型”而非字符串\n例如对路由器使用，会返回[accent]@router[]
lenum.shoot = 向某个位置瞄准/射击
lenum.shootp = 根据提前量向某个单位或建筑瞄准/射击
lenum.config = 建筑设置，例如分类器所设置的筛选物品种类
lenum.enabled = 建筑是否已启用

laccess.color = 照明器发光的颜色
laccess.controller = 单位的控制方\n如果单位由处理器控制，返回对应的处理器\n如果单位在编队中，返回编队的领队\n其他情况，返回单位自身
laccess.dead = 单位或建筑是否已被摧毁或者已失效
laccess.controlled = 若单位的控制方是处理器，返回[accent]@ctrlProcessor[]\n若单位/建筑由玩家控制，返回[accent]@ctrlPlayer[]\n若单位在编队中，返回[accent]@ctrlFormation[]\n其他情况，返回0
laccess.progress = 进度，0到1之间的数值。 \n返回工厂生产、 炮塔装填，或者建筑建造的进度
laccess.speed = 单位的最高速度（格/秒）

lcategory.unknown = 未知
lcategory.unknown.description = 未分类的指令
lcategory.io = 输入 & 输出
lcategory.io.description = 修改内存块和处理器内存的内容
lcategory.block = 控制方块
lcategory.block.description = 交互控制方块
lcategory.operation = 操作
lcategory.operation.description = 操作该逻辑
lcategory.control = 控制顺序
lcategory.control.description = 管理执行顺序
lcategory.unit = 控制单位
lcategory.unit.description = 指挥单位
lcategory.world = 世界
lcategory.world.description = 控制世界的各类设置

graphicstype.clear = 用指定的颜色填充整个显示屏
graphicstype.color = 设置后续画图操作所使用的颜色
graphicstype.col = 颜色代码。\n为以[accent]%[]开头的十六进制代码形式。\n举例: [accent]%ff0000[] 为[red]红色
graphicstype.stroke = 设置线条宽度
graphicstype.line = 绘制线段
graphicstype.rect = 绘制实心矩形
graphicstype.linerect = 绘制矩形轮廓
graphicstype.poly = 绘制实心正多边形
graphicstype.linepoly = 绘制正多边形轮廓
graphicstype.triangle = 绘制实心三角形
graphicstype.image = 画出某个游戏内容的图像\n例如[accent]@router[]或者[accent]@dagger[]

lenum.always = 无条件跳转
lenum.idiv = 整数除法，返回不带小数的商
lenum.div = 除法，除以0时返回[accent]null[]
lenum.mod = 求除法的余数
lenum.equal = 相等。 转换参数类型后进行比较\n与数字进行比较时，null转换为0，非null对象转换为1
lenum.notequal = 不相等。 转换参数类型后进行比较
lenum.strictequal = 严格相等。 不转换参数类型\n可用于准确检查[accent]null[]对象
lenum.shl = 左移位
lenum.shr = 右移位
lenum.or = 按位或
lenum.land = 逻辑与
lenum.and = 按位与
lenum.not = 按位非
lenum.xor = 按位异或

lenum.min = 取较小值
lenum.max = 取较大值
lenum.angle = 返回向量的辐角（角度制）
lenum.len = 返回向量的长度

lenum.sin = 正弦（角度制）
lenum.cos = 余弦（角度制）
lenum.tan = 正切（角度制）

lenum.asin = 反正弦（角度制）
lenum.acos = 反余弦（角度制）
lenum.atan = 反正切（角度制）

#not a typo, look up 'range notation'（括号不配非笔误，实乃区间表示法）
lenum.rand = 取 [0, 参数）范围内的一个随机数
lenum.log = 自然对数（ln）
lenum.log10 = 以10为底的对数
lenum.noise = 二维单形噪声
lenum.abs = 绝对值
lenum.sqrt = 开平方

lenum.any = 任意单位
lenum.ally = 己方单位
lenum.attacker = 有武器的单位
lenum.enemy = 敌方单位
lenum.boss = Boss单位
lenum.flying = 空中单位
lenum.ground = 地面单位
lenum.player = 玩家控制的单位

lenum.ore = 矿脉
lenum.damaged = 受损的己方建筑
lenum.spawn = 敌人出生点\n可以是核心或者某个坐标
lenum.building = 某个分类下的建筑

lenum.core = 核心
lenum.storage = 仓储建筑（容器/仓库）
lenum.generator = 发电建筑
lenum.factory = 生产物品的工厂
lenum.repair = 维修点
lenum.battery = 电池
lenum.resupply = 补给点\n仅当启用了[accent]“单位有弹药限制”[]时生效
lenum.reactor = 钍反应堆/冲击反应堆
lenum.turret = 炮塔

sensor.in = 所获取数据的建筑或单位

radar.from = 以哪个建筑为中心展开搜寻\n搜寻距离受限于该建筑的感知范围
radar.target = 筛选搜寻的单位类型
radar.and = 额外的筛选条件
radar.order = 排序方式：1/true从小到大，0/false反之
radar.sort = 排序标准
radar.output = 找到的单位存入此变量

unitradar.target = 筛选搜寻的单位类型
unitradar.and = 额外的筛选条件
unitradar.order = 排序方式：1/true从小到大，0/false反之
unitradar.sort = 排序标准
unitradar.output = 找到的单位存入此变量

control.of = 要控制的建筑
control.unit = 要瞄准的单位或建筑
control.shoot = 是否射击

unitlocate.enemy = 是否搜寻敌方建筑（0或false则搜寻己方建筑）
unitlocate.found = 若找到，在此变量中存入true；未找到则存入false
unitlocate.building = 找到的建筑存入此变量
unitlocate.outx = 存入找到的X轴坐标
unitlocate.outy = 存入找到的Y轴坐标
unitlocate.group = 所搜寻的建筑分类

lenum.idle = 原地不动，但继续进行手上的采矿/建造动作\n单位的默认状态
lenum.stop = 停止移动/采矿/建造动作
lenum.unbind = 停用单位的逻辑控制\n恢复常规AI
lenum.move = 移动到某个位置
lenum.approach = 靠近某个位置至一定的距离内
lenum.pathfind = 寻路移动至敌人出生点
lenum.target = 向某个位置瞄准/射击
lenum.targetp = 根据提前量向某个目标瞄准/射击
lenum.itemdrop = 将携带的物品放入一座建筑
lenum.itemtake = 从建筑中取出某种物品
lenum.paydrop = 卸下当前载荷
lenum.paytake = 从当前位置拾取载荷
lenum.payenter = 进入/降落到单位下方的荷载方块中
lenum.flag = 给单位赋予数字形式的标记
lenum.mine = 从某个位置采集矿物
lenum.build = 建造建筑
lenum.getblock = 获取某个坐标处的建筑及其类型\n坐标需要在单位的感知范围内\n无建筑的地面返回[accent]@air[]，墙壁返回[accent]@solid[]
lenum.within = 检查单位是否接近了某个位置
lenum.boost = 开始/停止助推
onset.commandmode = 按住[accent]shift[]键进入[accent]指挥模式[]。\n按住[accent]鼠标左键[]框选单位。\n[accent]右键[]指挥所选单位移动或攻击。
onset.commandmode.mobile = 点击左下角的[accent]指挥[]进入[accent]指挥模式[]。\n按住屏幕，[accent]拖动[]框选单位。\n[accent]点击[]指挥所选单位移动或攻击。
