block.ai-integer-module-production.name = 谐振装配厂
block.ai-integer-module-production.description = 敌人的攻击正在向我们未曾设想过的密度和强度发展。在更差的后勤条件下，我们必须选择保证战略科技的压制性，将更高级、先进的单位、炮塔、生产建筑提上日程。对于现役的墙体来说，整体铸造的墙体更加坚固，但无法达到快速建造以构筑初期防线的目的；模块化墙体建设方便迅速，但对于物理性打击的防御能力稍逊于前者——即使这样，模块化墙体也仍旧是主流被动防御设施的发展方向之一，炮塔、单位等也是同理，它们需要更坚固的发射系统和更强硬的装甲，以适应更高的膛压和战斗烈度。为此，古科公司研发出了以粒子震动规律为蓝本、高度整合震动速率为基础的整型变量技术。通过控制粒子核的统一震动速率来将它们以特定形状固定，这样会形成在两核力作用范围之间的原子核结构——这种结构是几乎无法被打破的。而用于稳定整体结构的整型变量核心则控制所有粒子表面的切合程度，吸收模块粒子规律振动的能量并产生磁场，再利用磁场规律模块粒子的震动。\n\n尽管每个IA整形粒子模块内部核心都需要能量供给，但这两种能量的转化效率能够达到无限接近于100%，无需专线接入因此一般不将IA整型变量模块视为耗能设备。
