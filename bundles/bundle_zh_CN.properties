block.ai-mini-water-extractor.details = “我叫微型抽水机，我有一个梦想，为宇宙膜激发重组织器和短域规律释放能器提供流体...”
block.ai-fast-drill.name = 快速掘进机
block.ai-fast-drill.description = 新型钻头，使用多档位激光刀头与石墨烯换热器。使用流体进行快速冷却循环，请输入高比热容冷却液以达到最大开采功率。
