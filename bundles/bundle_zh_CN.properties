block.ai-phase-mass-energy-decay-room.name = 相位质能衰变室
block.ai-phase-mass-energy-decay-room.description = 作为首屈一指的前沿科技，它被用于在极短的时间内将物质的相位直接转换为能量。因为物质的相位与物体的能量和动量密切相关，而在已知的材料中，相位织物基于极高的能量密度被用作衰变的原材料，它能够在极短的时间内产出大量电能。\n尽量让相位质能衰变室远离一切有能量密度差的地块，包括矿产区、地热块甚至是浅水湾——这些地形因素的影响会大大降低相位质能衰变的能量收集速率。\n\n[red]不要试图减少冷却供应，纯能收集罐一旦破裂，附近的一切都会灰飞烟灭！
block.ai-phase-mass-energy-decay-room.details = 如果为了稳定，还是使用聚变反应堆吧
block.ai-high-energy-capacitor.name = HEC
block.ai-high-energy-capacitor.description = 新一代蓄电设施，将电力输入内部蓄电介质转换为亚稳态粒子团，粒子团密度需严格控制，可以与附近的高能电容器连接并增大存储量。在特定激发下稳定使巨浪合金释放电力进行电网调峰。储电时不稳定，注意保护。
block.ai-high-energy-capacitor.details = 能够存储巨量能源是现代文明的基础。
block.ai-T2-power-node.name = 进阶电力节点
block.ai-T2-power-node.description = 随着电能在这里的广泛利用，原先的输电设备已经难以维持生产需要。这是新型的电力节点，利用串联的铅酸电池提供电压，以达到更远的电力输送距离。此外，我们对电力链接设备也进行了更新——基础芯片的使用可以获得更高的运力上限，让电力节点有更多的连接数。
block.ai-T2-power-node.details = 串联的电池组当然能为整个电路提供一些电容量，但小心——被击毁的电池组或许会腐蚀附近的建筑！
#核心/辅助
block.ai-prism-core.name = 棱镜核心
block.ai-prism-core.description = 为了能够更快速地在新星球立足并持续探索和扩大战线，远古科技公司以“以量为本”的设计理念，以初代核心为蓝本研制了“棱镜”核心系统。\n\n“棱镜”这一系列的高自动化核心相较于初代核心，其装甲和结构强度较低，取而代之的是更大的物资储存空间和更多的识别带宽——这也是为了能够批量生产、广泛降落、快速抢夺要点且尽可能的降低成本、增加核心落地后“成活率”的最优设计之一——至少远古科技公司的设计人员是这么说的。
block.ai-prism-core.details = 玻璃产品易碎，请注意轻拿轻放
block.ai-compartment.name = 货箱集
block.ai-compartment.description = 占地4*4，存储巨量物品
block.ai-compartment.details = 物流整合
chip.name = 埃塞克雷达
chip.description = 一种高度先进的复合雷达设施。利用超高频侦测的电波吸收组件和覆盖全频段的物理天线达成对全波段信息的接收。此外，一台重型的干涉量子雷达用于探测匿踪和轨道目标，也可以辅助炮塔锁定敌军单位，被锁定的敌人会试图利用机动脱离。
chip.details = 火眼金睛
#物流
block.ai-T2-reinforced-conduit.name = 通量管道
block.ai-T2-duct.name = 通量导轨
block.ai-T2-duct.description = 通量导轨\n向前方输送物品，比普通管道更快。
block.ai-T2-duct.details = 全密封壳体，耐高温材料，可在极端环境下正常运作。
block.ai-T2-duct-bridge.name = 通量导轨桥
block.ai-T2-overflow-duct.name = 通量导轨溢流门
block.ai-T2-underflow-duct.name = 通量导轨反向溢流门
block.ai-duct-junction.name = 管道交叉器
block.ai-duct-junction.description = 两条管道的桥梁
block.ai-duct-junction.details = 广告位招租 
block.ai-super-router.name = 分类枢纽
block.ai-super-router.description = 新型分类元件\n以路由器和分类器为蓝本的物流分拣模块。对原有内置分拣器进行了迭代升级并加装了最新的控制系统。可直接由外部控制目标物品与方向，进一步简化了物流模式，使紧凑型分类定向成为可能。
block.ai-super-router.details = 那么代价是什么呢？
block.ai-metaglass-conveyor.name = 轻型传送带
block.ai-metaglass-conveyor.description = 钢化玻璃传送带\n比进阶传送带更快，造价也相对塑钢带更便宜，但极其脆弱。
block.ai-metaglass-conveyor.details = “仅仅多了一点需求”
block.ai-metaglass-junction.name = 轻型交叉器
block.ai-metaglass-junction.description = 比交叉器更快，但极其脆弱。
block.ai-metaglass-junction.details = 广告位招租 
block.ai-metaglass-router.name = 轻型路由器
block.ai-metaglass-router.description = 比路由器更快，但极其脆弱。
block.ai-metaglass-router.details = 主神化身
block.ai-metaglass-bridge-conveyor.name = 轻型传送带桥
block.ai-metaglass-bridge-conveyor.description = 比传送带桥更快，但极其脆弱。
block.ai-metaglass-bridge-conveyor.details = 联接你我心灵的彩虹桥
block.ai-stackBridge.name = 塑钢栈桥
block.ai-stackBridge.description = 赛普罗星球上的传送带和传送带桥确实要比那些运输车便宜、可靠的多，它们能够更好的在相对不稳定的环境里运转，这也是我们继续发展传送带和传送带桥的原因之一。\n塑钢栈桥是我们结合了赛普罗星的塑钢传送带和传送带桥科技研发而成的。相对于地形适应能力较差、只适合长途单一物品运输的塑钢传送带而言，塑钢传送带桥可以跨越沟壑或建筑，同时能够更简易的与其他运输设备连接。
block.ai-stackBridge.details = 安装专用运输组件，转运过程中无需拆分进行二次打包 
block.ai-plastanium-router.name = 塑钢路由器
block.ai-plastanium-router.description = 把打包传送带上的物品平均分配到三个方向。
block.ai-glass-steel-conveyor.name = 高速轻轨
block.ai-glass-steel-conveyor.description = 为迎合前线弹药运输的巨大物流负担，我们利用玻璃钢高强度、低密度的特性研制了这款物流设备，它能够将大量的物品打包进一个封装车厢，一次性运输至目的地——为确保运输效率最大化，只有当单个车厢满载时才会发车。当车厢抵达目的地时，物品会自动下卸，而车厢会被拖至轻轨下进行回收，以便下一次的运输。
block.ai-glass-steel-conveyor.details = 轻拿轻放
4*4雷鸟thunderbird
#炮台
block.ai-.name = 破片地雷
block.ai-.description = 简易的爆炸物，造价低廉，利用高速炸药爆炸的激波粉碎地雷外壳的数百个小型预制破片对敌造成杀伤。对敌方轻装甲单位效果显著。
block.ai-.name = 反载具地雷
block.ai-.description = 简易的爆炸物，造价相对低廉，利用高速炸药爆炸产生的激波摧毁附近的单位，能够在相对更小的范围内对敌重型装甲单位造成可观的杀伤，对较远距离的目标效果不佳。
block.ai-.name = 跟踪弹射布雷器
block.ai-.description = 在部署区域内建造一组近距掷弹筒。根据波动监测器传输的电信号，其内部的微型计算机能够准确的判断周围是否有敌方单位，并在判断成功后进行锁定。同时掷弹筒会调整角度，锁定在其射界内的四个目标。引爆发射药后四枚高爆战斗部将主动追踪敌方单位并造成杀伤。
block.ai-.details = 尽管它的造价更高一点，似乎脱离了“地雷”这一战术武器建造的初衷，但是我们不得不承认：对付那些没有配备主动拦截系统的家伙，它的确是一把好手。
block.ai-unclear-mine.name = 核地雷
block.ai-unclear-mine.description = 威力和范围都十分巨大的爆炸物，其内部贮存了一定当量的高浓度核燃料，并由其内部的波动监测器判断敌人来向。若微型计算机已经确定有大量敌人靠近，则会主动引爆雷管，压缩核装药至临界值，形成壮观的爆炸——绝对是敌人见过的最美妙的烟花秀。
block.ai-unclear-mine.details = 尽管为控制核地雷杀伤半径，它的装药被一减再减，但是它仍然是一枚货真价实的核弹，忽略它的威胁是绝对错误的。\n"不太清晰"
block.ai-.name = 相位震荡发生器
block.ai-.description = 以相位质能为主战斗部装药的大型地雷。内部的波动监测器会主动探查敌军动向，若有敌人进入爆炸范围内，其内部的相位坍缩包将立即启动，诱发相位震荡，硕大的波能会一举杀死近距离的敌人。尽管造价昂贵，但是它所造成的杀伤范围可控，便于安装至距离前线更近的战略防守地带，辅助前线在近处绞杀敌人。
block.ai-restricted.name = 束缚
block.ai-restricted.description = 束缚，小型裂化光束装置\n通过外部立场挟持发动机控制系统令其强行停机。
block.ai-restricted.details = "中控，你也不希望你的发动机短路熄火吧？"\n-"谁把这玩意对着采矿机的？"
block.ai-arklight.name = 弧刃
block.ai-arklight.description = 精密的脉冲激光器，弧刃能够使用射束直接击穿敌方来袭的小型空军单位或大型弹幕，有机体操纵员们更喜欢用“绣花针”来称呼它。它对于单位的轻装甲具有非常好的穿透效能，这要比那些实弹防空火炮对付小型战机的效果好的多。
block.ai-arklight.details = 点防御
block.ai-cersei.name = 瑟曦
block.ai-cersei.description = 陆基高频超宽带电磁脉冲系统。特制炮管内壁设置有连接至离子体燃烧器上的电极，燃烧器安装在炮后膛的末端。等离子体燃烧器两极间加上高压时，会产生电弧，使置于两极间的等离子体生成材料蒸发为过热的高压等离子体，在吸收了大量由能释放高电压的电子束泵高频启动释放的强电磁辐射后，高压等离子体出膛。经过目标附近时，电离辐射将击穿任何装甲，严重损毁敌电气设备；倘若命中，高温等离子体也能构成一定的物理损伤。
block.ai-cersei.details = 球状闪电发射器
block.ai-electriclight.name = 电光
block.ai-electriclight.description = 高温离子团发射器\n内置压缩机与电离舱，抽入空气并将其转为高温等离子体后向前方喷射。可对命中的单位或建筑造成严重的烧蚀。
block.ai-electriclight.details = 受限于温控与限制器技术不成熟，等离子体在短距离飞行后便会逸散，因此射程非常短。
block.ai-hell.name = 冥火
block.ai-hell.description = 借鉴了榴弹炮的三联装火箭炮，配备多种弹药以应对多种战斗场合。虽结构简单，但仍能在战场上发挥强大的压制力，在短时间内向敌军倾泻大量火力，对单位集群效果极佳——不过它的火力持续性不强，每次齐射间需要大量时间装填，毕竟原本的设计目标就是构筑远程毁伤屏障。
block.ai-hell.details = 混凝土破坏弹被用在火箭炮上确实是个新奇的设计。得益于较远的射程，我们拥有了一个能够快速摧毁防御工事、击溃敌军防线的家伙。\n面对重混合 叠加再构 相密 自适应等装甲块的毁伤表现不佳。
block.ai-skynet.name = 天网
block.ai-skynet.description = 高射炮组，配备了三座精度高、射程远的双联装高射炮，拥有火控计算机，能够发射多种防空弹药。所有弹种配备近炸引信、复合追踪器、矫正计算机和弹幕网络，能够精准锁定敌方空军并上传弹幕网络，对敌方轻装甲单位有着极佳的毁伤效果，多台“天网”组网后的一轮齐射也可以对重装甲单位构成较大的威胁。尽管相对来说“天网”防空系统比较简陋，但它仍是目前来说最有效的防空设施——或许它还会服役很长时间——低廉的造价和强大的毁伤能力总能让敌方前来侦查乃至发动进攻的空军单位有来无回。
block.ai-skynet.details = 
block.ai-return.name = 归雁
block.ai-return.description = 新型叠装火箭巢系统。采用电子击发方式，每次都能射击出装填在单个发射筒内的四发弹药，单次齐射共计射出三联装发射筒中的十二枚火箭弹，在一瞬间造成毁灭般的伤害。\n尽管作为火箭弹，它的射程和攻击模式却与常规火箭弹发射器截然不同——远古科技公司为“归雁”的火箭弹设计了多种战斗部和修正尾翼组，这使得它能够精确攻击敌方单位，甚至对低空单位构成威胁，是不可多得的、歼灭敌军先锋部队的武器系统。\n\n似乎它与常规火箭炮唯一的关联就是需要依照射击距离摆倾角发射了——不知道为什么远古科技公司官方仍旧对外宣称“这不是导弹”。
block.ai-return.details = 死从天降
block.ai-obituary.name = 讣告
block.ai-obituary.description = 新型重型超高速电磁炮，在当下的科技水平，“讣告”电磁轨道炮的性能超越了任何同期同类设计的武器，在精度极佳的情况下，弹速要比其他设计理念电磁炮高二到三倍，使用了大质量、高长径比的弹丸，使得炮弹有很好的远距离存能和超高的穿深，甚至能够轻易贯穿重装甲单位——即使这样，弹丸的剩余部分仍旧拥有极高的动能。在多靶测试中，“讣告”曾一次性穿透了多层大型钛钢墙体——这也表明对付敌人的装甲集群时，“讣告”能够轻易地撕开敌人进攻的阵型。
block.ai-obituary.details = 
block.ai-wraith.name = 咒魂
block.ai-wraith.description = 以“幽灵”双联装重型机炮为原型设计的“咒魂”双联装防御机炮，在“幽灵”的基础上改进了弹仓输送系统、火炮冷却装置和弹药架容量。此外，“咒魂”采用了比“幽灵”更大的口径、更坚固材料制造的火炮基座，超大弹仓使得即使后勤系统被摧毁，“咒魂”仍旧能够在前线战斗一段时间——直到被摧毁或弹药消耗完毕。
block.ai-wraith.details = 对机炮来说，我们仅仅认为小口径、高射速（即“战斗机炮”）才是唯一的发展方向，而“幽灵”双联装大口径机炮给了我们一个反例：这类射程远、口径大、结构坚固的武器相较于原先的设计理念拥有更广泛的适用性和在高压战场上的生存能力——我们把它们叫作“防御机炮”。\n\n据说设计者很苦恼于给他的这款杰作起名——他只能把原型机暂时叫做“咒魂”了。(还有人推荐使用“灭害灵”作为代号，但是听起来更像杀虫剂)
 
#杂项
block.force-projector.details = “防御魔法可关乎的是你核心的生存率...同步受力需要消耗很多魔力...”
block.ai-轻型装配站.name = 轻型装配站
block.ai-轻型装配站.description = 用于组装小型作战单位。
block.ai-轻型装配站.details = 轻量化一体组装车间，集成加工构建与组装全流程设备，可快速展开构建小型制式单位。
#娱乐
unit.ai-土著坦克.name = 悬挂式武器运载车
unit.ai-土著坦克.description = 这个好像是他们军队里里很重要的战争机器。大体来看跟我们的坦克形状一模一样，但是炮管更长，而整个车体没有我们一截履带大，里面也只能做三四个土著兵。如此小的武器也只能是运载车了。
unit.ai-土著坦克.details = 这小破玩意甚至可能打不穿较低科技水平的排斥场

unit.ai-土著巨型坦克.name = 大号仿真坦克模型
unit.ai-土著巨型坦克.description = 当我们第一次见到它们的时候，我们确实感到惊讶——这东西比他们的任何战斗车辆都大至少一倍！！可惜我们没见过它挪动哪怕一步。后来才知道，这就是个纪念品罢了。
unit.ai-土著巨型坦克.detail = 想象一下他动起来的样子吧！

unit.ai-土著运输车.name = 轮式运输车辆
unit.ai-土著运输车.description = 由多对轮底盘和前置驾驶室构成的车辆，后面庞大的车体似乎都是用来运载货物的——当然，经过远程对称设施分析表明：里面也能运上十来个土著兵。
unit.ai-土著运输车.detail = 双管炮这种炮台都能轻易击毁这玩意

unit.ai-RUS-31BM.name = RUS-31BM
unit.ai-RUS-31BM.description = 最近的前线空战中，敌方的超高速截击机引起了我们的注意，它甚至可以在最高速度下甩掉我们的部分防空导弹。经调查，该军用机型为RUS-31BM/BSM，拥有超高的速度。它配备6枚超远程空空导弹，可以轻易打击我们的空军单位，以至于在一定情况下击落我们的大型导弹——不得不说，这是迄今为止对我们威胁最大的敌方空军单位。
unit.ai-RUS-31BM.details = 有时候抛弃装甲、拥抱机动性和火力也许是正确的？护盾会解决这些的
unit.ai-NGF-262M.name = NGF-262M
unit.ai-NGF-262M.description = 这是一款常见的敌方战斗机，拥有较高的直线加速和最高速度。它配备了一门高射速的多用途机炮，具有较好的软目标毁伤能力。此外，4枚对空导弹和2枚对地导弹使得NGF-262M可以应对多个目标——这样的火力配置对于我们的低级飞行器来说拥有较强的空空杀伤能力。但很显然，这可能是敌方最优秀的战斗机了。
unit.ai-NGF-262M.details = 好吧，我们不得不把它夸大起来——实际上除了我们的侦察机，它打不过任何空军单位，也只能勉强逃过无锁定能力的防空网罢了。
unit.ai-T-IDS.name = T-IDS
unit.ai-T-IDS.description = 在更多的战斗中，敌军空军派出了专门的战斗轰炸机来试图为陆军突破我们的防线。它配有4门多用途机炮，可以轻易撕碎无装甲或轻装甲目标。此外，2枚拥有超远索敌距离的对空导弹在一定程度上可以超过我们空军单位的火力范围而发起攻击。2枚制导炸弹和2枚对地导弹对地面目标而言有不俗的杀伤力。
unit.ai-T-IDS.details = 真想不通他们的空军为什么会完全抛弃装甲防护，这使得无论他们在飞机上装什么高贵的设备也只配被一炮打下来——更何况T-IDS & ECR的机动性甚至不如NGF-262M……

block.ai-土著机场.name = 健身步道
block.ai-土著机场.description = 在敌人的前线后方，总有几条长且宽的、弯弯曲曲的硬质平地，一侧则总是安插着几个躺倒的半圆柱体建筑。首次观察到这种建筑时，我们无不惊异于这种奇特的大型跑道，很难想象我们的敌人居然有如此大的体型且热爱运动，但他们却以先进的空间压缩技术把自己塞进如此狭小的载具内，以谋求节省材料。经过如此以来的观察，我们才发现，这健身用的跑道只是紧急起降那些垂直起降速度很慢的飞机用的，他们没有我们想象的那样喜欢运动，也没有巨人一般的体型。

block.ai-土著火力发电.name = 蒸汽发生设施
block.ai-土著火力发电.description = 我们能够清楚的看到一辆一辆的运煤车进入这个建筑。而它正中心的桶一样的东西正不断冒出蒸汽，准确来说是掺杂着大量煤渣的蒸汽。他们要这个东西干什么用？真是一种能够主宰大自然生死的强大力量...

block.ai-土著核电站.name = 辐射岛
block.ai-土著核电站.description = 似乎是对他们非常重要的东西——像桶一样的管子罩在辐射超标的辐射岛上，而且还有人在里面活动！真是可怕，居然不害怕辐射...
block.ai-土著核电站.details = 这个东西竟然是发电用的？但是为什么它们不用Alpha晶体发电或者采用更先进的方式来收集能量？

block.ai-土著城市.name = 建筑群
block.ai-土著城市.description = 这些七零八落的小土块构成的笼子竟然是当地土著的住所和经济设施？如此庞大的规模却有着如此低下的生产效率，如果代换成我们同样占地面的核心，或许能够顶几十个这样的“城市”建筑群？
block.ai-土著城市.details = 紧凑，高污染的钢筋混凝土笼群

block.ai-铁路.name = 运输通路
block.ai-铁路.description = 它们用来运货的车辆，运用了轨道引导式设计，这跟我们的传送带正好相悖——当然，他们建筑的一标准长度铁路所需材料不及我们基础传送带所需的材料的十分之一，这么做对他们来说似乎确实是个好办法。

block.ai-.name = 废弃的培养皿仓库
block.ai-.description = 最早在珊瑚礁群岛周边发现的本地土著遗弃建筑，其中包括了数量庞大的培养基和水域中的同种海藻。其中因大风浪的缘故，这些废弃的培养仓库多数覆盖了盐分结晶，一些潮湿的墙面或地板上生长有那些海藻——看样子像是样品从中泄露而导致的站点废弃，是他们破坏了这片海洋。
block.ai-.details = 

载人烟花发射架
土著一直有利用焰色反应欣赏爆炸火光的习惯：这似乎是周期性、季节性的，当安亚鲁星每次绕恒星一周时，他们都会因庆祝恒星系统正常运行而发射大量此类爆炸物。根据土著人的习性，似乎越大的爆炸火光、越高的飞行距离对他们来说就越有价值。在我们发现的数个巨型（相较于土著个体的体型来讲）可燃物发射架上，观察员们观察到了有数个土著个体进入可燃柱体的现象。尽管在安亚鲁星大气层中，这些可燃物有百分之90以上的概率都会爆炸，却仍有大量个体在训练确保不会在爆炸中死亡的项目，试图进入其中。
好吧，那不是烟花，是他们用于发射荷载进入行星轨道的东西——这失误率是认真的？

chip.description = 废弃的生物培养基站
chip.description = 这所庞大的建筑物中，一台集超真空泵、低电超低温环境器等设备于一体的庞大机器占据了其核心区域，其中留有不少已经失活的海藻样本，似乎是用来研究或筛选能够在超低温和真空环境下存活的海藻品种。因大风浪的缘故，这些废弃的培养基站部分覆盖了盐分结晶，一些潮湿的墙面或地板上生长有那些海藻——看样子像是样品从中泄露而导致的站点废弃，是他们破坏了这片海洋。
chip.details = 是我们想复杂了，那根本不是什么用来筛选品种的东西——那是个低温电子显微镜而已。
#未使用
block.ai-kiwi-wall.name = 奇异装甲
block.ai-kiwi-wall.description = 再次分析我们舰船上的亚原子技术后构建的装甲块，对于任何的常规损伤手段(即动能、热能、电性等等)都展现出优越性能———纯聚变核武器连刮花它都很难，编程后的装甲片可以自适应为一个整体并更好的分摊奇异武器带来的损伤。
block.ai-kiwi-wall.details = 对于统一场激发武器很难发挥出效果，反而更容易被打散成粒子浆糊。
#结束
